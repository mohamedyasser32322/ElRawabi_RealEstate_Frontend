<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الروابي للعقارات — بوابة المشتري</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:      #0D2142;
      --primary-deep: #081830;
      --card-bg:      #112952;
      --card-hover:   #163366;
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.2);
      --light:        #FFFFFF;
      --text-muted:   #8fa3c0;
      --success:      #34c759;
      --warning:      #ffcc00;
      --danger:       #ff3b30;
      --accent:       #4e8df5;
      --gold:         #f5c842;
      --header-h:     64px;
      --tr:           all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html, body { font-family:'Tajawal',sans-serif; background:var(--primary-deep); color:var(--light); min-height:100vh; direction:rtl; overflow-x:hidden; }
    ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--primary-deep)} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:6px}

    /* HEADER */
    #app-header { position:fixed; top:0; right:0; left:0; height:var(--header-h); z-index:900; background:rgba(8,24,48,.97); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; gap:16px; }
    .header-right { display:flex; align-items:center; gap:16px; flex-shrink:0; min-width:0; }
    .header-logo { font-size:1.15rem; font-weight:800; color:var(--light); letter-spacing:-.3px; white-space:nowrap; cursor:pointer; transition:var(--tr); text-decoration:none; }
    .header-logo:hover { opacity:.75; }
    .header-divider { width:1px; height:26px; background:var(--border); flex-shrink:0; }
    .header-page-label { display:flex; flex-direction:column; gap:2px; overflow:hidden; }
    .header-page-title { font-size:.95rem; font-weight:700; color:var(--light); line-height:1; white-space:nowrap; }
    .header-role-badge { display:inline-flex; align-items:center; gap:5px; font-size:.68rem; font-weight:600; color:var(--gold); background:rgba(245,200,66,.1); border:1px solid rgba(245,200,66,.28); padding:2px 8px; border-radius:20px; width:fit-content; }
    .header-nav { display:flex; align-items:center; gap:4px; flex:1; justify-content:center; }
    .nav-tab { display:flex; align-items:center; gap:6px; padding:8px 13px; border-radius:10px; cursor:pointer; color:var(--text-muted); font-size:.84rem; font-weight:600; border:1px solid transparent; transition:var(--tr); white-space:nowrap; background:none; font-family:'Tajawal',sans-serif; }
    .nav-tab i { font-size:1rem; }
    .nav-tab:hover  { color:var(--light); background:rgba(255,255,255,.06); border-color:var(--border); }
    .nav-tab.active { color:var(--light); background:rgba(255,255,255,.1);  border-color:rgba(255,255,255,.2); }
    .header-left { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .header-user { display:flex; align-items:center; gap:8px; }
    .user-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--gold),#e6a800); display:flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:800; color:#0a1a30; border:2px solid rgba(245,200,66,.3); flex-shrink:0; }
    .user-name { font-size:.88rem; font-weight:700; color:var(--light); white-space:nowrap; }
    .logout-btn { display:flex; align-items:center; gap:6px; padding:7px 14px; border-radius:9px; background:rgba(255,59,48,.1); color:var(--danger); border:1px solid rgba(255,59,48,.28); cursor:pointer; font-family:'Tajawal',sans-serif; font-size:.82rem; font-weight:700; transition:var(--tr); white-space:nowrap; }
    .logout-btn:hover { background:rgba(255,59,48,.22); transform:translateY(-1px); }

    /* HAMBURGER */
    .hamburger { display:none; flex-direction:column; justify-content:center; align-items:center; gap:5px; width:38px; height:38px; border-radius:9px; background:rgba(255,255,255,.06); border:1px solid var(--border); cursor:pointer; padding:8px; flex-shrink:0; transition:var(--tr); }
    .hamburger:hover { background:rgba(255,255,255,.1); border-color:var(--border-hover); }
    .hamburger span { display:block; width:18px; height:2px; background:var(--light); border-radius:2px; transition:var(--tr); transform-origin:center; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; transform:scaleX(0); }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

    /* DRAWER */
    #drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1000; backdrop-filter:blur(4px); opacity:0; transition:opacity .3s ease; }
    #drawer-overlay.open { display:block; opacity:1; }
    #mobile-drawer { position:fixed; top:0; right:0; bottom:0; width:280px; max-width:85vw; z-index:1001; background:rgba(8,20,46,.99); border-left:1px solid var(--border); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .32s cubic-bezier(.4,0,.2,1); backdrop-filter:blur(20px); overflow-y:auto; }
    #mobile-drawer.open { transform:translateX(0); }
    .drawer-header { padding:20px 20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .drawer-logo { font-size:1.1rem; font-weight:800; color:var(--light); }
    .drawer-close { width:32px; height:32px; border-radius:8px; background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--text-muted); cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:var(--tr); }
    .drawer-close:hover { color:var(--light); background:rgba(255,255,255,.1); }
    .drawer-user { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .drawer-user .user-avatar { width:40px; height:40px; font-size:.9rem; }
    .drawer-user-info .user-name { font-size:.9rem; }
    .drawer-role { font-size:.72rem; color:var(--gold); margin-top:3px; }
    .drawer-nav { flex:1; padding:12px; display:flex; flex-direction:column; gap:4px; }
    .drawer-nav-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; cursor:pointer; color:var(--text-muted); font-size:.95rem; font-weight:600; border:1px solid transparent; transition:var(--tr); background:none; font-family:'Tajawal',sans-serif; width:100%; text-align:right; }
    .drawer-nav-item i { font-size:1.15rem; flex-shrink:0; }
    .drawer-nav-item:hover  { color:var(--light); background:rgba(255,255,255,.06); border-color:var(--border); }
    .drawer-nav-item.active { color:var(--gold); background:rgba(245,200,66,.1); border-color:rgba(245,200,66,.25); }
    .drawer-footer { padding:16px 12px; border-top:1px solid var(--border); }
    .drawer-logout { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:12px; background:rgba(255,59,48,.08); color:var(--danger); border:1px solid rgba(255,59,48,.2); cursor:pointer; font-family:'Tajawal',sans-serif; font-size:.9rem; font-weight:700; transition:var(--tr); width:100%; }
    .drawer-logout:hover { background:rgba(255,59,48,.18); }

    /* MAIN */
    #app-main { margin-top:var(--header-h); min-height:calc(100vh - var(--header-h)); padding:36px 36px 80px; max-width:1300px; margin-left:auto; margin-right:auto; transition:opacity .12s ease; }

    /* ANIMATIONS */
    @keyframes fadeUp  { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
    @keyframes spin    { to{transform:rotate(360deg)} }

    /* WELCOME */
    .b-welcome { background:linear-gradient(135deg,rgba(245,200,66,.06),rgba(78,141,245,.06)); border:1px solid rgba(245,200,66,.15); border-radius:20px; padding:24px 28px; margin-bottom:28px; animation:fadeUp .5s ease both; }
    .b-welcome h2 { font-size:1.4rem; font-weight:800; margin-bottom:4px; }
    .b-welcome p  { color:var(--text-muted); font-size:.88rem; }

    /* STATS */
    .b-stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:14px; margin-bottom:28px; }
    .b-stat { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:18px 20px; display:flex; align-items:center; gap:14px; opacity:0; animation:fadeUp .5s ease forwards; transition:var(--tr); }
    .b-stat:hover { transform:translateY(-3px); border-color:var(--border-hover); }
    .b-stat-icon { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
    .b-stat-icon.gold  { background:rgba(245,200,66,.15); color:var(--gold); }
    .b-stat-icon.green { background:rgba(52,199,89,.15);  color:var(--success); }
    .b-stat-icon.blue  { background:rgba(78,141,245,.15); color:var(--accent); }
    .b-stat-num { font-size:1.7rem; font-weight:800; line-height:1; }
    .b-stat-lbl { font-size:.73rem; color:var(--text-muted); margin-top:3px; font-weight:600; }

    /* SECTION HDR */
    .b-sec-hdr { display:flex; align-items:center; margin-bottom:16px; }
    .b-sec-title { font-size:1rem; font-weight:800; display:flex; align-items:center; gap:8px; }
    .b-sec-title i { color:var(--text-muted); }

    /* UNIT CARDS */
    .b-units-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:18px; }
    .b-unit-card { background:var(--card-bg); border:1px solid var(--border); border-radius:18px; overflow:hidden; transition:var(--tr); opacity:0; animation:fadeUp .5s ease forwards; }
    .b-unit-card:hover { transform:translateY(-5px); border-color:rgba(78,141,245,.35); box-shadow:0 18px 44px rgba(0,0,0,.4); }

    .b-unit-strip { padding:18px 20px 14px; background:linear-gradient(135deg,rgba(78,141,245,.07),transparent 70%); border-bottom:1px solid var(--border); }
    .b-unit-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .b-unit-number { font-size:1.5rem; font-weight:800; color:var(--accent); }
    .b-unit-type-badge { font-size:.7rem; font-weight:700; padding:3px 10px; border-radius:20px; background:rgba(78,141,245,.12); color:var(--accent); border:1px solid rgba(78,141,245,.25); }
    .b-unit-status { display:inline-flex; align-items:center; gap:5px; font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:10px; }
    .b-unit-status.reserved { background:rgba(255,204,0,.1); color:var(--warning); border:1px solid rgba(255,204,0,.28); }
    .b-unit-status.sold     { background:rgba(52,199,89,.1);  color:var(--success); border:1px solid rgba(52,199,89,.28); }
    .b-unit-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .b-unit-tag { display:inline-flex; align-items:center; gap:5px; font-size:.75rem; font-weight:600; padding:4px 10px; border-radius:8px; background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text-muted); }
    .b-unit-tag i { font-size:.8rem; color:var(--accent); opacity:.8; }

    .b-unit-body { padding:16px 20px 20px; }
    .b-unit-info { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .b-unit-cell { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
    .b-unit-cell-lbl { font-size:.65rem; color:var(--text-muted); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
    .b-unit-cell-val { font-size:.92rem; font-weight:700; }

    .b-unit-cta { width:100%; padding:11px; border-radius:11px; background:rgba(78,141,245,.1); color:var(--accent); border:1px solid rgba(78,141,245,.25); font-family:'Tajawal',sans-serif; font-size:.88rem; font-weight:700; cursor:pointer; transition:var(--tr); display:flex; align-items:center; justify-content:center; gap:7px; }
    .b-unit-cta:hover { background:rgba(78,141,245,.2); border-color:var(--accent); transform:translateY(-1px); }

    /* SKEL */
    .skel { background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:16px; }

    /* EMPTY */
    .b-empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .b-empty i { font-size:3rem; display:block; margin-bottom:14px; opacity:.3; }
    .b-error-state { text-align:center; padding:60px; color:var(--danger); }

    /* TOAST */
    #b-toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
    .b-toast { display:flex; align-items:center; gap:10px; padding:12px 18px; border-radius:12px; background:rgba(8,18,38,.98); border:1px solid var(--border); color:var(--light); font-size:.88rem; font-weight:600; animation:fadeUp .24s ease; pointer-events:all; max-width:320px; }
    .b-toast.success { border-color:rgba(52,199,89,.4); }
    .b-toast.error   { border-color:rgba(255,59,48,.4); }
    .b-toast i { font-size:1.1rem; flex-shrink:0; }
    .b-toast.success i { color:var(--success); }
    .b-toast.error   i { color:var(--danger); }

    /* RESPONSIVE */
    @media(max-width:1100px){ .nav-tab span{display:none} .nav-tab{padding:8px 10px} }
    @media(max-width:768px){
      #app-header{padding:0 16px;gap:10px} .header-nav{display:none} .hamburger{display:flex}
      .logout-btn{display:none} .user-name{display:none} .header-divider{display:none}
      #app-main{padding:20px 16px 80px} .b-units-grid{grid-template-columns:1fr}
      .b-stats{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:400px){ .b-stats{grid-template-columns:1fr 1fr} .header-page-label{display:none} }
  </style>
</head>
<body>

<header id="app-header"></header>
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<nav id="mobile-drawer">
  <div class="drawer-header">
    <span class="drawer-logo">الروابي للعقارات</span>
    <button class="drawer-close" onclick="closeDrawer()"><i class="ri-close-line"></i></button>
  </div>
  <div class="drawer-user">
    <div class="user-avatar" id="drawer-avatar">؟</div>
    <div class="drawer-user-info">
      <div class="user-name" id="drawer-username">—</div>
      <div class="drawer-role" id="drawer-role">مشتري</div>
    </div>
  </div>
  <div class="drawer-nav" id="drawer-nav"></div>
  <div class="drawer-footer">
    <button class="drawer-logout" onclick="handleLogout()"><i class="ri-logout-box-r-line"></i>تسجيل الخروج</button>
  </div>
</nav>
<div id="b-toast-container"></div>

<main id="app-main">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
    <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite"></div>
  </div>
</main>

<script src="Layout.js"></script>
<script src="router.js"></script>
<script>
/* ══ Drawer ══ */
function openDrawer()  { document.getElementById('mobile-drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); document.querySelector('.hamburger')?.classList.add('open'); document.body.style.overflow='hidden'; }
function closeDrawer() { document.getElementById('mobile-drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); document.querySelector('.hamburger')?.classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDrawer(); });

/* ══ Toast ══ */
window.showBToast = function(msg, type='success') {
  const el = document.createElement('div');
  el.className = `b-toast ${type}`;
  el.innerHTML = `<i class="ri-${type==='success'?'checkbox-circle':'error-warning'}-line"></i><span>${msg}</span>`;
  document.getElementById('b-toast-container').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='.3s'; setTimeout(()=>el.remove(),320); }, 3200);
};

/* ══ API ══ */
const API_BASE = `http://${location.hostname}:5256`;
window.__API_BASE   = API_BASE;
window.__getToken   = () => { try{ return JSON.parse(localStorage.getItem('authData')||'{}').token||''; }catch{return '';} };
window.__getBuyerId = () => { try{ return JSON.parse(localStorage.getItem('authData')||'{}').id||null; }catch{return null;} };

async function apiFetch(path) {
  const r = await fetch(API_BASE+path, { headers:{'Authorization':'Bearer '+window.__getToken()} });
  if(!r.ok) throw new Error(r.status);
  return r.json().catch(()=>null);
}
function toArr(v) { return Array.isArray(v)?v:(v?.data||v?.items||v?.value||v?.results||[]); }

/* ══ DASHBOARD ══ */
window.__loadDashboard = async function() {
  const main = document.getElementById('app-main');
  const ud   = JSON.parse(localStorage.getItem('authData')||'{}');
  const name = (ud.email||'').split('@')[0]||'مشتري';
  const buyerId = ud.id;

  main.innerHTML = `
    <div class="b-welcome">
      <h2>أهلاً وسهلاً، ${name} 👋</h2>
      <p>تابع وحداتك ومراحل البناء من هنا</p>
    </div>
    <div class="b-stats" id="b-stats">
      ${Array(3).fill('<div class="skel" style="height:78px"></div>').join('')}
    </div>
    <div class="b-sec-hdr">
      <div class="b-sec-title"><i class="ri-home-4-line"></i> وحداتي</div>
    </div>
    <div id="b-units-wrap">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px">
        ${Array(2).fill('<div class="skel" style="height:260px"></div>').join('')}
      </div>
    </div>`;

  try {
    const [unitsData, floorsData, buildingsData, projectsData] = await Promise.all([
      apiFetch('/api/Units').catch(()=>[]),
      apiFetch('/api/Floors').catch(()=>[]),
      apiFetch('/api/Buildings').catch(()=>[]),
      apiFetch('/api/Projects').catch(()=>[]),
    ]);
    const units     = toArr(unitsData);
    const floors    = toArr(floorsData);
    const buildings = toArr(buildingsData);
    const projects  = toArr(projectsData);

    const myUnits  = units.filter(u => Number(u.buyerId)===Number(buyerId));
    const soldCnt  = myUnits.filter(u => u.status===3||u.status==='Sold').length;
    const resCnt   = myUnits.filter(u => u.status!==3&&u.status!=='Sold').length;

    /* Stats */
    const statsEl = document.getElementById('b-stats');
    if(statsEl) statsEl.innerHTML = `
      <div class="b-stat" style="animation-delay:0ms">
        <div class="b-stat-icon gold"><i class="ri-home-4-line"></i></div>
        <div><div class="b-stat-num">${myUnits.length}</div><div class="b-stat-lbl">إجمالي الوحدات</div></div>
      </div>
      <div class="b-stat" style="animation-delay:60ms">
        <div class="b-stat-icon green"><i class="ri-checkbox-circle-line"></i></div>
        <div><div class="b-stat-num">${soldCnt}</div><div class="b-stat-lbl">مباعة</div></div>
      </div>
      <div class="b-stat" style="animation-delay:120ms">
        <div class="b-stat-icon blue"><i class="ri-time-line"></i></div>
        <div><div class="b-stat-num">${resCnt}</div><div class="b-stat-lbl">محجوزة</div></div>
      </div>`;

    /* Units */
    const wrap = document.getElementById('b-units-wrap');
    if(!wrap) return;
    if(!myUnits.length) {
      wrap.innerHTML = `<div class="b-empty"><i class="ri-home-smile-line"></i><p>لا توجد وحدات مرتبطة بحسابك حتى الآن</p></div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'b-units-grid';

    myUnits.forEach((unit, idx) => {
      const floor    = floors.find(f => Number(f.id)===Number(unit.floorId));
      const building = buildings.find(b => Number(b.id)===Number(floor?.buildingId));
      const project  = projects.find(p => Number(p.id)===Number(building?.projectId));
      const isSold   = unit.status===3||unit.status==='Sold';
      const typeLabel = unit.type===3?'روف':'شقة';
      const bId      = building?.id||null;
      const price    = Number(unit.price)||0;
      const rooms    = unit.numberOfRooms||unit.roomsCount||unit.rooms||null;
      const district = unit.district||unit.neighborhood||project?.location||null;

      const card = document.createElement('div');
      card.className = 'b-unit-card';
      card.style.animationDelay = `${idx*80}ms`;
      card.innerHTML = `
        <div class="b-unit-strip">
          <div class="b-unit-hdr">
            <div class="b-unit-number">وحدة ${unit.unitNumber||'—'}</div>
            <div class="b-unit-type-badge">${typeLabel}</div>
          </div>
          <div class="b-unit-status ${isSold?'sold':'reserved'}">
            <i class="ri-${isSold?'checkbox-circle':'time'}-line"></i>
            ${isSold?'مباعة':'محجوزة'}
          </div>
          <div class="b-unit-tags">
            ${project  ?`<span class="b-unit-tag"><i class="ri-map-pin-2-line"></i>${project.name}</span>`:''}
            ${building ?`<span class="b-unit-tag"><i class="ri-building-2-line"></i>${building.name}</span>`:''}
            ${floor    ?`<span class="b-unit-tag"><i class="ri-stack-line"></i>الدور ${floor.floorNumber}</span>`:''}
            ${district ?`<span class="b-unit-tag"><i class="ri-map-2-line"></i>${district}</span>`:''}
          </div>
        </div>
        <div class="b-unit-body">
          <div class="b-unit-info">
            <div class="b-unit-cell">
              <div class="b-unit-cell-lbl">السعر الكلي</div>
              <div class="b-unit-cell-val">${price?price.toLocaleString('ar-SA')+' ر.س':'—'}</div>
            </div>
            <div class="b-unit-cell">
              <div class="b-unit-cell-lbl">المساحة</div>
              <div class="b-unit-cell-val">${unit.area?unit.area+' م²':'—'}</div>
            </div>
            ${rooms?`
            <div class="b-unit-cell">
              <div class="b-unit-cell-lbl">عدد الغرف</div>
              <div class="b-unit-cell-val">${rooms} غرفة</div>
            </div>`:''}
            <div class="b-unit-cell">
              <div class="b-unit-cell-lbl">رقم الوحدة</div>
              <div class="b-unit-cell-val">${unit.unitNumber||'—'}</div>
            </div>
          </div>
          ${bId?`
          <button class="b-unit-cta"
            data-bid="${bId}"
            data-bname="${building?.name||''}"
            data-pname="${project?.name||''}"
            data-fnum="${floor?.floorNumber||''}"
            data-unum="${unit.unitNumber||''}">
            <i class="ri-building-4-line"></i> عرض مراحل البناء
          </button>`:''}
        </div>`;
      grid.appendChild(card);
    });

    wrap.innerHTML = '';
    wrap.appendChild(grid);

    grid.querySelectorAll('.b-unit-cta').forEach(btn => {
      btn.addEventListener('click', () => {
        window.__constructionTarget = {
          buildingId:   btn.dataset.bid,
          buildingName: btn.dataset.bname,
          projectName:  btn.dataset.pname,
          floorNum:     btn.dataset.fnum,
          unitNum:      btn.dataset.unum,
        };
        navigate('construction');
      });
    });

  } catch(e) {
    console.error(e);
    window.showBToast('فشل تحميل البيانات','error');
  }
};

/* ══ Boot ══ */
document.addEventListener('DOMContentLoaded', function() {
  initLayout();
  const hl = document.querySelector('.header-left');
  if(hl) {
    const ham = document.createElement('button');
    ham.className='hamburger'; ham.setAttribute('aria-label','القائمة');
    ham.innerHTML='<span></span><span></span><span></span>';
    ham.onclick=openDrawer; hl.prepend(ham);
  }
  window.__initRouter?.();
});
</script>
</body>
</html>
