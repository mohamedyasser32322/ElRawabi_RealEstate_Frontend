<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مدير الحجوزات — الروابي للعقارات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:      #0D2142;
      --primary-deep: #081830;
      --card-bg:      #112952;
      --card-hover:   #163366;
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.2);
      --light:        #FFFFFF;
      --text-muted:   #8fa3c0;
      --success:      #34c759;
      --warning:      #ffcc00;
      --danger:       #ff3b30;
      --accent:       #4e8df5;
      --header-h:     64px;
      --transition:   all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html, body {
      font-family: 'Tajawal', sans-serif;
      background: var(--primary-deep);
      color: var(--light);
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--primary-deep); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 6px; }

    /* ══ HEADER ══ */
    #app-header {
      position: fixed; top: 0; right: 0; left: 0;
      height: var(--header-h); z-index: 900;
      background: rgba(8,24,48,0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; gap: 16px;
    }
    .header-right { display:flex; align-items:center; gap:16px; flex-shrink:0; }
    .header-logo {
      font-size: 1.15rem; font-weight: 800; color: var(--light);
      letter-spacing: -0.3px; white-space: nowrap;
      text-decoration: none; cursor: pointer; transition: var(--transition);
    }
    .header-logo:hover { opacity: 0.75; }
    .header-divider { width:1px; height:26px; background:var(--border); flex-shrink:0; }
    .header-role-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.72rem; font-weight: 700;
      color: var(--warning); background: rgba(255,204,0,0.1);
      border: 1px solid rgba(255,204,0,0.28);
      padding: 3px 10px; border-radius: 20px; white-space: nowrap;
    }
    .header-nav { display:flex; align-items:center; gap:4px; flex:1; justify-content:center; }
    .nav-tab {
      display:flex; align-items:center; gap:6px;
      padding:8px 14px; border-radius:10px; cursor:pointer;
      color:var(--text-muted); font-size:0.87rem; font-weight:600;
      border:1px solid transparent; transition:var(--transition);
      white-space:nowrap; background:none; font-family:'Tajawal',sans-serif;
    }
    .nav-tab i { font-size:1rem; }
    .nav-tab:hover  { color:var(--light); background:rgba(255,255,255,0.06); border-color:var(--border); }
    .nav-tab.active { color:var(--light); background:rgba(255,255,255,0.1);  border-color:rgba(255,255,255,0.2); }
    .header-left { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .user-avatar {
      width:34px; height:34px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),#2563eb);
      display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; font-weight:800; color:#fff;
      border:2px solid rgba(255,255,255,0.15); flex-shrink:0;
    }
    .user-name { font-size:0.88rem; font-weight:700; color:var(--light); white-space:nowrap; }
    .logout-btn {
      display:flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:9px;
      background:rgba(255,59,48,0.1); color:var(--danger);
      border:1px solid rgba(255,59,48,0.28); cursor:pointer;
      font-family:'Tajawal',sans-serif; font-size:0.82rem; font-weight:700;
      transition:var(--transition);
    }
    .logout-btn:hover { background:rgba(255,59,48,0.22); }
    .hamburger {
      display:none; flex-direction:column; justify-content:center; align-items:center;
      gap:5px; width:38px; height:38px; border-radius:9px;
      background:rgba(255,255,255,0.06); border:1px solid var(--border);
      cursor:pointer; flex-shrink:0; transition:var(--transition);
    }
    .hamburger span { display:block; width:18px; height:2px; background:var(--light); border-radius:2px; transition:var(--transition); transform-origin:center; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; transform:scaleX(0); }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

    /* ══ DRAWER ══ */
    #drawer-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.62); z-index:1000;
      backdrop-filter:blur(4px); opacity:0; transition:opacity 0.28s ease;
    }
    #drawer-overlay.open { display:block; opacity:1; }
    #mobile-drawer {
      position:fixed; top:0; right:0; bottom:0;
      width:270px; max-width:85vw; z-index:1001;
      background:rgba(8,20,46,0.99); border-left:1px solid var(--border);
      display:flex; flex-direction:column;
      transform:translateX(110%);
      transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter:blur(20px); overflow-y:auto;
    }
    #mobile-drawer.open { transform:translateX(0); }
    .drawer-header {
      padding:18px 18px 14px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .drawer-logo { font-size:1.05rem; font-weight:800; color:var(--light); }
    .drawer-close {
      width:30px; height:30px; border-radius:8px;
      background:rgba(255,255,255,0.05); border:1px solid var(--border);
      color:var(--text-muted); cursor:pointer; font-size:1.05rem;
      display:flex; align-items:center; justify-content:center; transition:var(--transition);
    }
    .drawer-close:hover { color:var(--light); }
    .drawer-user {
      padding:14px 18px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:11px; flex-shrink:0;
    }
    .drawer-user .user-avatar { width:40px; height:40px; font-size:.9rem; }
    .drawer-uname { font-size:.88rem; font-weight:700; color:var(--light); }
    .drawer-role  { font-size:.7rem; color:var(--warning); margin-top:2px; }
    .drawer-nav { flex:1; padding:10px; display:flex; flex-direction:column; gap:3px; }
    .drawer-nav-item {
      display:flex; align-items:center; gap:12px;
      padding:11px 13px; border-radius:11px; cursor:pointer;
      color:var(--text-muted); font-size:0.92rem; font-weight:600;
      border:1px solid transparent; transition:var(--transition);
      background:none; font-family:'Tajawal',sans-serif; width:100%; text-align:right;
    }
    .drawer-nav-item i { font-size:1.1rem; flex-shrink:0; }
    .drawer-nav-item:hover  { color:var(--light); background:rgba(255,255,255,0.06); border-color:var(--border); }
    .drawer-nav-item.active { color:var(--accent); background:rgba(78,141,245,0.12); border-color:rgba(78,141,245,0.25); }
    .drawer-footer { padding:12px 10px; border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-logout {
      display:flex; align-items:center; gap:10px;
      padding:11px 13px; border-radius:11px;
      background:rgba(255,59,48,0.08); color:var(--danger);
      border:1px solid rgba(255,59,48,0.18); cursor:pointer;
      font-family:'Tajawal',sans-serif; font-size:0.9rem; font-weight:700;
      transition:var(--transition); width:100%;
    }
    .drawer-logout:hover { background:rgba(255,59,48,0.18); }

    /* ══ MAIN ══ */
    #app-main {
      margin-top:var(--header-h);
      min-height:calc(100vh - var(--header-h));
      padding:36px 36px 80px;
      max-width:1400px; margin-left:auto; margin-right:auto;
      transition:opacity 0.15s ease;
    }

    /* Animations */
    @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes countUp { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    /* ══ DASHBOARD ══ */
    .page-header { margin-bottom:28px; animation:fadeUp 0.5s ease both; }
    .page-header h1 { font-size:1.6rem; font-weight:800; color:var(--light); margin-bottom:4px; }
    .page-header p  { color:var(--text-muted); font-size:0.9rem; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
    .stat-card {
      background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:20px;
      display:flex; flex-direction:column; gap:10px;
      opacity:0; animation:fadeUp 0.5s ease forwards; transition:var(--transition);
    }
    .stat-card:hover { transform:translateY(-5px); border-color:var(--border-hover); box-shadow:0 20px 48px rgba(0,0,0,.45); background:var(--card-hover); }
    .stat-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .stat-icon { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .stat-number { font-size:2.2rem; font-weight:800; line-height:1; animation:countUp .6s ease both; }
    .stat-label  { font-size:.78rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
    .stat-card.blue   .stat-icon   { background:rgba(78,141,245,.15); color:var(--accent); }
    .stat-card.green  .stat-icon   { background:rgba(52,199,89,.15);  color:var(--success); }
    .stat-card.yellow .stat-icon   { background:rgba(255,204,0,.15);  color:var(--warning); }
    .stat-card.red    .stat-icon   { background:rgba(255,59,48,.15);  color:var(--danger); }
    .stat-card.purple .stat-icon   { background:rgba(175,82,222,.15); color:#af52de; }
    .stat-card.blue   .stat-number { color:var(--accent); }
    .stat-card.green  .stat-number { color:var(--success); }
    .stat-card.yellow .stat-number { color:var(--warning); }
    .stat-card.red    .stat-number { color:var(--danger); }
    .stat-card.purple .stat-number { color:#af52de; }
    .bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .panel {
      background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:22px;
      opacity:0; animation:fadeUp .5s ease forwards; animation-delay:.35s;
    }
    .panel-title { font-size:.95rem; font-weight:700; color:var(--light); margin-bottom:18px; display:flex; align-items:center; gap:8px; }
    .panel-title i { color:var(--text-muted); }
    .prog-item { margin-bottom:16px; }
    .prog-item:last-child { margin-bottom:0; }
    .prog-header { display:flex; justify-content:space-between; margin-bottom:7px; font-size:.84rem; font-weight:600; }
    .prog-track { height:7px; background:rgba(255,255,255,.06); border-radius:20px; overflow:hidden; }
    .prog-fill  { height:100%; border-radius:20px; transition:width 1s ease; }
    .ring-container { position:relative; width:120px; height:120px; flex-shrink:0; }
    .ring-svg  { transform:rotate(-90deg); }
    .ring-bg   { fill:none; stroke:rgba(255,255,255,.06); stroke-width:10; }
    .ring-fill { fill:none; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1.2s ease; }
    .ring-label { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .ring-pct { font-size:1.5rem; font-weight:800; line-height:1; }
    .ring-sub { font-size:.68rem; color:var(--text-muted); margin-top:3px; }
    .occupancy-wrapper { display:flex; align-items:center; gap:24px; }
    .legend-list { display:flex; flex-direction:column; gap:9px; }
    .legend-row  { display:flex; align-items:center; gap:8px; font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .legend-dot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .legend-row strong { color:var(--light); margin-right:auto; }
    .skel { background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:16px; }

    /* ══ RESPONSIVE ══ */
    @media (max-width:1100px) { .nav-tab span{display:none} .nav-tab{padding:8px 10px} }
    @media (max-width:768px) {
      #app-header { padding:0 16px; }
      .header-nav,.logout-btn,.user-name,.header-divider { display:none; }
      .hamburger { display:flex; }
      #app-main { padding:20px 16px 80px; }
      .stats-grid { grid-template-columns:repeat(2,1fr); gap:12px; }
      .stat-number { font-size:1.7rem; }
      .bottom-grid { grid-template-columns:1fr; }
      .occupancy-wrapper { flex-direction:column; align-items:flex-start; }
    }
    @media (max-width:400px) { .stats-grid{grid-template-columns:1fr 1fr;gap:10px} }
  </style>
</head>
<body>

<header id="app-header"></header>

<div id="drawer-overlay" onclick="closeDrawer()"></div>
<nav id="mobile-drawer">
  <div class="drawer-header">
    <span class="drawer-logo">الروابي للعقارات</span>
    <button class="drawer-close" onclick="closeDrawer()"><i class="ri-close-line"></i></button>
  </div>
  <div class="drawer-user">
    <div class="user-avatar" id="d-avatar">م</div>
    <div>
      <div class="drawer-uname" id="d-uname">—</div>
      <div class="drawer-role">مدير الحجوزات</div>
    </div>
  </div>
  <div class="drawer-nav" id="d-nav"></div>
  <div class="drawer-footer">
    <button class="drawer-logout" onclick="handleLogout()">
      <i class="ri-logout-box-r-line"></i> تسجيل الخروج
    </button>
  </div>
</nav>

<main id="app-main">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
    <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite"></div>
  </div>
</main>

<!-- Layout + Router -->
<script src="Layout.js"></script>
<script src="router.js"></script>

<!-- Dashboard data loader -->
<script>
window.__bmDashboardHTML = `
  <div class="page-header">
    <h1>لوحة إدارة الحجوزات</h1>
    <p>مرحباً بك — يمكنك إدارة الحجوزات والمشترين والاطلاع على المشاريع</p>
  </div>
  <div class="stats-grid" id="dash-stats">
    ${Array(6).fill('<div class="skel" style="height:106px"></div>').join('')}
  </div>
  <div class="bottom-grid" id="dash-bottom">
    <div class="skel" style="height:240px"></div>
    <div class="skel" style="height:240px"></div>
  </div>
`;

window.__bmLoadDashboard = async function(){
  const API_BASE = `http://${location.hostname}:5256`;
  function getToken(){
    try{ const d=JSON.parse(localStorage.getItem('authData')||'{}'); return d.token||''; }catch{ return ''; }
  }
  async function get(p){
    const r=await fetch(API_BASE+p,{headers:{'Authorization':'Bearer '+getToken()}});
    if(!r.ok) throw new Error(r.status);
    return r.json().catch(()=>null);
  }
  function arr(v){ return Array.isArray(v)?v:(v?.data||v?.items||v?.value||[]); }
  function toStatus(v){
    if(typeof v==='number') return v;
    return{available:1,reserved:2,sold:3,closed:4,Available:1,Reserved:2,Sold:3,Closed:4}[v]??4;
  }
  try{
    const[pd,ud,byd]=await Promise.all([
      get('/api/Projects').catch(()=>null),
      get('/api/Units').catch(()=>null),
      get('/api/Buyers').catch(()=>null),
    ]);
    const P=arr(pd), U=arr(ud), BY=arr(byd);
    const avail=U.filter(u=>toStatus(u.status)===1).length;
    const resrv =U.filter(u=>toStatus(u.status)===2).length;
    const sold  =U.filter(u=>toStatus(u.status)===3).length;
    const total =U.length;
    const occ   =total?Math.round((resrv+sold)/total*100):0;

    const statsEl=document.getElementById('dash-stats');
    if(!statsEl) return;
    const cards=[
      {cls:'blue',  icon:'ri-home-4-line',         num:P.length,  lbl:'المشاريع'},
      {cls:'blue',  icon:'ri-layout-grid-line',     num:total,     lbl:'إجمالي الوحدات'},
      {cls:'green', icon:'ri-checkbox-circle-line', num:avail,     lbl:'متاح'},
      {cls:'yellow',icon:'ri-time-line',            num:resrv,     lbl:'محجوز'},
      {cls:'red',   icon:'ri-price-tag-3-line',     num:sold,      lbl:'مباع'},
      {cls:'purple',icon:'ri-group-line',           num:BY.length, lbl:'العملاء'},
    ];
    statsEl.innerHTML=cards.map((c,i)=>`
      <div class="stat-card ${c.cls}" style="animation-delay:${i*50}ms">
        <div class="stat-top">
          <div>
            <div class="stat-number">${c.num.toLocaleString('ar-SA')}</div>
            <div class="stat-label">${c.lbl}</div>
          </div>
          <div class="stat-icon"><i class="${c.icon}"></i></div>
        </div>
      </div>`).join('');

    const circ=2*Math.PI*52, off=circ-(occ/100)*circ;
    const bottomEl=document.getElementById('dash-bottom');
    if(!bottomEl) return;
    bottomEl.innerHTML=`
      <div class="panel">
        <div class="panel-title"><i class="ri-pie-chart-2-line"></i> نسبة الإشغال</div>
        <div class="occupancy-wrapper">
          <div class="ring-container">
            <svg class="ring-svg" viewBox="0 0 120 120" width="120" height="120">
              <circle class="ring-bg" cx="60" cy="60" r="52"/>
              <circle class="ring-fill" cx="60" cy="60" r="52" stroke="var(--accent)"
                stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>
            </svg>
            <div class="ring-label">
              <div class="ring-pct" style="color:var(--accent)">${occ}%</div>
              <div class="ring-sub">مشغول</div>
            </div>
          </div>
          <div class="legend-list">
            <div class="legend-row"><div class="legend-dot" style="background:var(--success)"></div>متاح<strong>${avail}</strong></div>
            <div class="legend-row"><div class="legend-dot" style="background:var(--warning)"></div>محجوز<strong>${resrv}</strong></div>
            <div class="legend-row"><div class="legend-dot" style="background:var(--danger)"></div>مباع<strong>${sold}</strong></div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title"><i class="ri-bar-chart-2-line"></i> توزيع الوحدات</div>
        ${total>0?[
          {lbl:'متاح', num:avail,col:'var(--success)'},
          {lbl:'محجوز',num:resrv,col:'var(--warning)'},
          {lbl:'مباع', num:sold, col:'var(--danger)'},
        ].map(x=>{
          const pct=Math.round(x.num/total*100);
          return `<div class="prog-item">
            <div class="prog-header"><span style="color:var(--light)">${x.lbl}</span><span style="color:var(--text-muted)">${pct}%</span></div>
            <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${x.col}"></div></div>
          </div>`;
        }).join(''):
        '<p style="color:var(--text-muted);font-size:.9rem">لا توجد بيانات بعد</p>'}
      </div>`;
  }catch(e){ console.error('Dashboard error:',e); }
};
</script>

</body>
</html>
