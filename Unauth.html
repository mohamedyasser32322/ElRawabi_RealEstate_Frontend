<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير مصرح — النظام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #0D2142;
      --primary-deep: #081830;
      --card-bg:      #112952;
      --border:       rgba(255,255,255,0.08);
      --light:        #FFFFFF;
      --text-muted:   #8fa3c0;
      --danger:       #ff3b30;
      --accent:       #4e8df5;
      --success:      #34c759;
      --warning:      #ffcc00;
    }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse    { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.96)} }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes shimmer  { 0%{background-position:200% center} 100%{background-position:-200% center} }
    @keyframes scan     { 0%{transform:translateY(-100%)} 100%{transform:translateY(400%)} }
    @keyframes glitch1  { 0%,100%{clip-path:inset(0 0 98% 0)} 20%{clip-path:inset(33% 0 66% 0)} 40%{clip-path:inset(80% 0 5% 0)} 60%{clip-path:inset(15% 0 75% 0)} 80%{clip-path:inset(55% 0 35% 0)} }
    @keyframes glitch2  { 0%,100%{clip-path:inset(0 0 98% 0);transform:translate(0)} 20%{clip-path:inset(50% 0 40% 0);transform:translate(-3px,0)} 40%{clip-path:inset(10% 0 85% 0);transform:translate(3px,0)} 60%{clip-path:inset(70% 0 25% 0);transform:translate(-2px,0)} 80%{clip-path:inset(30% 0 60% 0);transform:translate(2px,0)} }

    html, body {
      height: 100%;
      font-family: 'Tajawal', sans-serif;
      background: var(--primary-deep);
      color: var(--light);
      overflow: hidden;
    }

    /* ── Background grid ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(78,141,245,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(255,59,48,0.05) 0%, transparent 60%),
        var(--primary-deep);
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* ── Animated corner lines ── */
    .corner {
      position: fixed; width: 80px; height: 80px; z-index: 1;
      opacity: 0.25;
    }
    .corner::before, .corner::after {
      content: ''; position: absolute;
      background: var(--accent);
      animation: pulse 3s ease-in-out infinite;
    }
    .corner::before { width: 2px; height: 100%; top: 0; }
    .corner::after  { width: 100%; height: 2px; top: 0; }
    .corner.tl { top: 24px; right: 24px; }
    .corner.tl::before { right: 0; }
    .corner.tl::after  { right: 0; }
    .corner.br { bottom: 24px; left: 24px; transform: rotate(180deg); }
    .corner.br::before { right: 0; }
    .corner.br::after  { right: 0; }

    /* ── Center card ── */
    .page {
      position: relative; z-index: 2;
      height: 100%; display: flex;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(17,41,82,0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 52px 48px 44px;
      max-width: 480px; width: 100%;
      text-align: center;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 40px 80px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.08) inset;
      animation: fadeUp .6s cubic-bezier(.34,1.3,.64,1) both;
    }

    /* ── Icon block ── */
    .icon-wrap {
      position: relative;
      width: 96px; height: 96px;
      margin: 0 auto 28px;
      animation: float 4s ease-in-out infinite;
    }
    .icon-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(255,59,48,0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    .icon-ring-outer {
      position: absolute; inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(255,59,48,0.12);
      animation: pulse 2.5s ease-in-out infinite reverse;
    }
    .icon-inner {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(135deg, rgba(255,59,48,.18) 0%, rgba(255,59,48,.06) 100%);
      border: 1.5px solid rgba(255,59,48,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    .icon-inner i {
      font-size: 2.4rem;
      color: var(--danger);
      filter: drop-shadow(0 0 12px rgba(255,59,48,0.5));
    }

    /* ── Scan line on icon ── */
    .scan-wrap {
      position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
    }
    .scan-line {
      position: absolute; inset: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,59,48,0.6) 50%, transparent 100%);
      animation: scan 2.5s linear infinite;
    }

    /* ── Code badge ── */
    .code-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 14px; border-radius: 20px;
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.25);
      font-size: .72rem; font-weight: 800;
      color: var(--danger); letter-spacing: 1.5px;
      margin-bottom: 18px;
      animation: fadeIn .5s .2s both;
    }
    .code-badge::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--danger);
      animation: pulse 1s ease-in-out infinite;
    }

    /* ── Glitch title ── */
    .glitch-wrap {
      position: relative;
      margin-bottom: 14px;
      animation: fadeIn .5s .3s both;
    }
    .glitch-title {
      font-size: 2rem; font-weight: 900;
      color: var(--light);
      letter-spacing: -.03em;
    }
    .glitch-title::before,
    .glitch-title::after {
      content: attr(data-text);
      position: absolute; top: 0; right: 0; left: 0;
      font-size: 2rem; font-weight: 900;
    }
    .glitch-title::before {
      color: rgba(255,59,48,0.7);
      animation: glitch1 4s infinite;
    }
    .glitch-title::after {
      color: rgba(78,141,245,0.7);
      animation: glitch2 4s infinite .15s;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: .95rem; color: var(--text-muted);
      line-height: 1.65; margin-bottom: 32px;
      animation: fadeIn .5s .4s both;
    }
    .subtitle strong { color: rgba(255,255,255,.75); font-weight: 700; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      margin-bottom: 28px;
      animation: fadeIn .5s .45s both;
    }

    /* ── Buttons ── */
    .btn-login {
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      width: 100%; padding: 14px 28px; border-radius: 12px;
      background: var(--accent);
      color: #fff; border: none;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: all .3s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 6px 24px rgba(78,141,245,.35);
      margin-bottom: 12px;
      animation: fadeUp .5s .5s both;
      position: relative; overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-login:hover {
      background: #3a7de4;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(78,141,245,.45);
    }
    .btn-login:active { transform: translateY(0); }

    /* ── Footer note ── */
    .footer-note {
      font-size: .75rem; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      animation: fadeIn .5s .65s both;
    }
    .footer-note i { font-size: .85rem; color: var(--text-muted); }

    /* ── Top status bar ── */
    .status-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      height: 3px;
      background: linear-gradient(90deg, var(--danger), rgba(255,59,48,.3), var(--danger));
      background-size: 200% auto;
      animation: shimmer 2s linear infinite;
    }

    /* ── Responsive ── */
    @media(max-width: 480px) {
      .card { padding: 36px 24px 32px; border-radius: 18px; }
      .glitch-title { font-size: 1.6rem; }
      .glitch-title::before, .glitch-title::after { font-size: 1.6rem; }
      .corner { display: none; }
    }
  </style>
</head>
<body>

  <!-- Status bar -->
  <div class="status-bar"></div>

  <!-- Backgrounds -->
  <div class="bg"></div>
  <div class="bg-grid"></div>

  <!-- Corners -->
  <div class="corner tl"></div>
  <div class="corner br"></div>

  <!-- Main -->
  <div class="page">
    <div class="card">

      <!-- Icon -->
      <div class="icon-wrap">
        <div class="icon-ring-outer"></div>
        <div class="icon-ring"></div>
        <div class="icon-inner">
          <i class="ri-shield-cross-line"></i>
        </div>
        <div class="scan-wrap">
          <div class="scan-line"></div>
        </div>
      </div>

      <!-- Code badge -->
      <div class="code-badge">
        <span>403 — FORBIDDEN</span>
      </div>

      <!-- Title -->
      <div class="glitch-wrap">
        <h1 class="glitch-title" data-text="غير مصرح بالدخول">غير مصرح بالدخول</h1>
      </div>

      <!-- Subtitle -->
      <p class="subtitle">
        ليس لديك <strong>صلاحية</strong> للوصول إلى هذه الصفحة.<br>
        يرجى تسجيل الدخول بحساب مخوّل للمتابعة.
      </p>

      <div class="divider"></div>

      <!-- CTA -->
      <a href="/login.html" class="btn-login">
        <i class="ri-login-circle-line"></i>
        تسجيل الدخول
      </a>

    </div>
  </div>

</body>
</html>
