<!DOCTYPE html>
<html lang="ar" dir="rtl" style="opacity:0;visibility:hidden;background:#0a1a30;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>تسجيل الدخول — الروابي للعقارات</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:      #34c759;
    --green-dark: #28a745;
    --danger:     #ff3b30;
    --muted:      #8fa3c0;
    --card:       rgba(17,41,82,0.55);
    --border:     rgba(255,255,255,0.1);
    --ease:       all 0.4s cubic-bezier(0.23,1,0.32,1);
  }

  html, body {
    width: 100%; min-height: 100%;
    background: #0a1a30;
    font-family: 'Tajawal', sans-serif;
    color: #fff;
    direction: rtl;
    overflow-x: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100svh;
    padding: 20px 16px;
    position: relative;
  }

  /* ── Background ── */
  .bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 60% 30%, #162e55 0%, #0a1a30 70%);
  }
  .blob {
    position: absolute; filter: blur(80px);
    opacity: .08; border-radius: 50%;
  }
  .b1 {
    width: clamp(200px,50vw,480px); height: clamp(200px,50vw,480px);
    background: #fff; top: -20%; right: -15%;
    animation: f1 20s ease-in-out infinite;
  }
  .b2 {
    width: clamp(160px,40vw,360px); height: clamp(160px,40vw,360px);
    background: #34c759; bottom: -15%; left: -10%;
    animation: f2 25s ease-in-out infinite reverse;
  }
  @keyframes f1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(60px,30px) scale(1.08)} }
  @keyframes f2 { 0%,100%{transform:translate(0,0) scale(1.08)} 50%{transform:translate(-50px,-40px) scale(1)} }

  /* ── Back button ── */
  .back-btn {
    position: fixed; top: 20px; right: 20px;
    display: flex; align-items: center; gap: 7px;
    color: var(--muted); text-decoration: none;
    font-weight: 600; font-size: .85rem;
    padding: 8px 14px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 11px;
    transition: var(--ease); z-index: 200;
    backdrop-filter: blur(12px);
  }
  .back-btn svg { width: 15px; height: 15px; transition: transform .3s ease; flex-shrink: 0; }
  .back-btn:hover { color:#fff; background:rgba(255,255,255,.09); border-color:rgba(255,255,255,.18); transform:translateX(-3px); }
  .back-btn:hover svg { transform: translateX(3px); }

  /* ── Wrapper ── */
  .wrapper {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    padding-top: 8px;
  }

  /* ── Header ── */
  .header {
    text-align: center; margin-bottom: 28px;
    animation: slideDown .7s cubic-bezier(0.23,1,0.32,1) both;
  }
  @keyframes slideDown {
    from { opacity:0; transform:translateY(-20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .logo-mark {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 10px 24px rgba(52,199,89,.3);
  }
  .logo-mark svg { width: 26px; height: 26px; fill: #fff; }
  .logo { font-size: clamp(1.4rem,5vw,1.7rem); font-weight: 800; letter-spacing:-.5px; margin-bottom: 5px; }
  .header p { color: var(--muted); font-size: clamp(.82rem,3vw,.9rem); }

  /* ── Card ── */
  .card {
    background: var(--card);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-radius: 22px;
    border: 1px solid var(--border);
    padding: clamp(24px,6vw,40px);
    box-shadow: 0 24px 56px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.07);
    animation: cardPop .7s cubic-bezier(0.34,1.4,0.64,1) .1s both;
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }
  @keyframes cardPop {
    from { opacity:0; transform:scale(.93) translateY(28px); }
    to   { opacity:1; transform:scale(1)   translateY(0); }
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
  .card.shake { animation: shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97); }

  /* ── Form groups ── */
  .g { margin-bottom: 16px; opacity:0; animation: fadeInR .5s ease forwards; }
  .g:nth-child(1) { animation-delay:.3s; }
  .g:nth-child(2) { animation-delay:.4s; }
  @keyframes fadeInR {
    from { opacity:0; transform:translateX(14px); }
    to   { opacity:1; transform:translateX(0); }
  }

  label.lbl {
    display: block; color: rgba(255,255,255,.8);
    font-weight: 600; font-size: .83rem; margin-bottom: 7px;
  }
  .inp {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1.5px solid rgba(255,255,255,.1);
    padding: 13px 15px;
    border-radius: 12px;
    color: #fff; font-family: inherit;
    font-size: max(.92rem,16px);
    transition: var(--ease);
  }
  .inp::placeholder { color: rgba(255,255,255,.22); }
  .inp:focus {
    outline: none;
    background: rgba(255,255,255,.08);
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(52,199,89,.18);
    transform: translateY(-1px);
  }
  .inp.inp-error { border-color:rgba(255,59,48,.5); background:rgba(255,59,48,.06); }
  .inp.inp-error:focus { border-color:var(--danger); box-shadow:0 0 0 3px rgba(255,59,48,.15); }
  .inp:-webkit-autofill, .inp:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 100px #112952 inset !important;
    -webkit-text-fill-color: #fff !important;
    caret-color: #fff;
  }

  /* ── Field error ── */
  .field-error {
    display: flex; align-items: center; gap: 6px;
    margin-top: 6px; font-size: .78rem; color: #ff7b72; font-weight: 600;
    opacity:0; max-height:0; overflow:hidden;
    transition: opacity .3s ease, max-height .3s ease;
  }
  .field-error.show { opacity:1; max-height:30px; }
  .field-error svg { width:13px; height:13px; flex-shrink:0; fill:#ff7b72; }

  /* ══ SUBMIT BUTTON — المحور الأساسي ══ */
  .btn-wrap { margin-top: 24px; position: relative; }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff; border: none;
    padding: 0;
    border-radius: 14px;
    cursor: pointer; font-family: inherit;
    font-weight: 700; font-size: .97rem;
    position: relative; overflow: hidden;
    box-shadow: 0 8px 22px rgba(52,199,89,.28);
    height: 54px;
    -webkit-tap-highlight-color: transparent;
    transition: box-shadow .3s ease, transform .2s ease;
  }
  .btn:hover:not(:disabled):not(.loading):not(.btn-success):not(.btn-fail) {
    transform: translateY(-2px);
    box-shadow: 0 14px 28px rgba(52,199,89,.4);
  }
  .btn:active:not(:disabled) { transform: scale(.985); }

  /* Shimmer sweep on hover */
  .btn::before {
    content:''; position:absolute;
    top:-50%; left:-70%; width:18%; height:200%;
    background: rgba(255,255,255,.18);
    transform: rotate(25deg); transition:.55s;
    pointer-events:none;
  }
  .btn:hover::before { left: 115%; }

  /* Default label */
  .btn-label {
    position: absolute; inset:0;
    display: flex; align-items:center; justify-content:center;
    font-weight: 700; font-size: .97rem;
    transition: opacity .25s ease, transform .25s ease;
  }

  /* ── Spinner ring ── */
  .btn-spinner-ring {
    position: absolute; top:50%; left:50%;
    width: 26px; height: 26px;
    margin: -13px 0 0 -13px;
    opacity: 0;
    transition: opacity .2s ease;
    pointer-events: none;
  }
  .btn-spinner-ring svg {
    width: 100%; height: 100%;
    animation: none;
  }
  .spinner-track { stroke: rgba(255,255,255,.2); }
  .spinner-arc   { stroke: #fff; stroke-linecap: round; stroke-dasharray: 60; stroke-dashoffset: 60; }

  /* ── Check mark ── */
  .btn-check {
    position: absolute; top:50%; left:50%;
    width: 28px; height: 28px;
    margin: -14px 0 0 -14px;
    opacity: 0; transform: scale(0.4);
    transition: opacity .3s ease, transform .4s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .btn-check svg { width:100%; height:100%; }
  .check-circle { fill: none; stroke: #fff; stroke-width: 2.2; stroke-dasharray: 66; stroke-dashoffset: 66; }
  .check-tick   { fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 20; stroke-dashoffset: 20; }

  /* ── X mark ── */
  .btn-x {
    position: absolute; top:50%; left:50%;
    width: 26px; height: 26px;
    margin: -13px 0 0 -13px;
    opacity: 0; transform: scale(0.4) rotate(-45deg);
    transition: opacity .3s ease, transform .4s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .btn-x svg { width:100%; height:100%; }
  .x-circle { fill: none; stroke: #fff; stroke-width: 2.2; stroke-dasharray: 66; stroke-dashoffset: 66; }
  .x-lines  { fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 20; stroke-dashoffset: 20; }

  /* ══ STATES ══ */

  /* Loading */
  .btn.loading { pointer-events: none; }
  .btn.loading .btn-label { opacity:0; transform: scale(.8); }
  .btn.loading .btn-spinner-ring { opacity:1; }
  .btn.loading .btn-spinner-ring svg { animation: spinRing .8s linear infinite; }
  .btn.loading .spinner-arc {
    animation: drawArc 1.4s ease-in-out infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  @keyframes drawArc {
    0%   { stroke-dashoffset: 60; }
    50%  { stroke-dashoffset: 15; }
    100% { stroke-dashoffset: 60; }
  }

  /* Success */
  .btn.btn-success {
    background: linear-gradient(135deg, #1e9e3c, #16772d);
    box-shadow: 0 8px 28px rgba(30,158,60,.45);
    pointer-events: none;
    animation: successPulse .5s ease;
  }
  @keyframes successPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .btn.btn-success .btn-label   { opacity:0; transform: scale(.8); }
  .btn.btn-success .btn-spinner-ring { opacity:0; }
  .btn.btn-success .btn-check   { opacity:1; transform: scale(1); }
  .btn.btn-success .check-circle {
    animation: drawCircle .5s ease forwards;
  }
  .btn.btn-success .check-tick {
    animation: drawTick .35s ease .45s forwards;
  }
  @keyframes drawCircle { to { stroke-dashoffset: 0; } }
  @keyframes drawTick   { to { stroke-dashoffset: 0; } }

  /* Fail */
  .btn.btn-fail {
    background: linear-gradient(135deg, #c0392b, #962d22);
    box-shadow: 0 8px 28px rgba(192,57,43,.4);
    pointer-events: none;
    animation: failShake .45s cubic-bezier(0.36,0.07,0.19,0.97);
  }
  @keyframes failShake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-7px)}
    40%{transform:translateX(7px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }
  .btn.btn-fail .btn-label   { opacity:0; transform: scale(.8); }
  .btn.btn-fail .btn-spinner-ring { opacity:0; }
  .btn.btn-fail .btn-x { opacity:1; transform: scale(1) rotate(0deg); }
  .btn.btn-fail .x-circle {
    animation: drawCircle .5s ease forwards;
  }
  .btn.btn-fail .x-lines {
    animation: drawX .35s ease .45s forwards;
  }
  @keyframes drawX { to { stroke-dashoffset: 0; } }

  /* ── Ripple effect on click ── */
  .btn-ripple {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,.25);
    transform: scale(0); pointer-events: none;
    animation: ripple .6s ease-out forwards;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  /* ── Glow ring under button (success) ── */
  .btn-glow {
    position: absolute; inset: -4px;
    border-radius: 18px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s ease;
    background: transparent;
    box-shadow: 0 0 0 2px rgba(52,199,89,.5), 0 0 20px 4px rgba(52,199,89,.2);
  }
  .btn-wrap.glow-success .btn-glow { opacity: 1; }
  .btn-wrap.glow-fail    .btn-glow { box-shadow: 0 0 0 2px rgba(255,59,48,.5), 0 0 20px 4px rgba(255,59,48,.2); opacity: 1; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .back-btn { top:14px; right:14px; padding:7px 11px; font-size:.8rem; }
    .wrapper  { padding-top: 52px; }
  }
  @media (max-height: 600px) and (orientation: landscape) {
    body { align-items: flex-start; padding-top: 12px; }
    .header { margin-bottom: 16px; }
    .g { margin-bottom: 10px; }
  }
</style>
</head>
<body>

<div class="bg"><div class="blob b1"></div><div class="blob b2"></div></div>

<a href="interface.html" class="back-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
  عودة للرئيسية
</a>

<div class="wrapper">
  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9" fill="rgba(0,0,0,.2)"/>
      </svg>
    </div>
    <div class="logo">الروابي للعقارات</div>
    <p>مرحباً بك، سجّل دخولك للمتابعة</p>
  </div>

  <form class="card" id="loginForm" onsubmit="handleLogin(event)" novalidate>
    <div class="g">
      <label class="lbl" for="email">البريد الإلكتروني</label>
      <input type="email" id="email" class="inp"
             placeholder="example@domain.com"
             required autocomplete="email" inputmode="email"
             oninput="clearFieldError('emailError','email')"/>
      <div class="field-error" id="emailError">
        <svg viewBox="0 0 20 20"><path d="M10 0C4.5 0 0 4.5 0 10s4.5 10 10 10 10-4.5 10-10S15.5 0 10 0zm1 15H9v-2h2v2zm0-4H9V5h2v6z"/></svg>
        <span id="emailErrorText">يرجى إدخال البريد الإلكتروني</span>
      </div>
    </div>

    <div class="g">
      <label class="lbl" for="password">كلمة المرور</label>
      <input type="password" id="password" class="inp"
             placeholder="••••••••"
             required autocomplete="current-password"
             oninput="clearFieldError('passwordError','password')"/>
      <div class="field-error" id="passwordError">
        <svg viewBox="0 0 20 20"><path d="M10 0C4.5 0 0 4.5 0 10s4.5 10 10 10 10-4.5 10-10S15.5 0 10 0zm1 15H9v-2h2v2zm0-4H9V5h2v6z"/></svg>
        <span id="passwordErrorText">يرجى إدخال كلمة المرور</span>
      </div>
    </div>

    <!-- ══ BUTTON ══ -->
    <div class="btn-wrap" id="btnWrap">
      <div class="btn-glow"></div>
      <button type="submit" class="btn" id="submitBtn">

        <!-- Default label -->
        <span class="btn-label">تسجيل الدخول</span>

        <!-- Spinner -->
        <div class="btn-spinner-ring">
          <svg viewBox="0 0 26 26" fill="none">
            <circle class="spinner-track" cx="13" cy="13" r="10" stroke-width="2.5"/>
            <circle class="spinner-arc"   cx="13" cy="13" r="10" stroke-width="2.5"
                    transform="rotate(-90 13 13)"/>
          </svg>
        </div>

        <!-- Check -->
        <div class="btn-check">
          <svg viewBox="0 0 28 28" fill="none">
            <circle class="check-circle" cx="14" cy="14" r="10"
                    transform="rotate(-90 14 14)"/>
            <polyline class="check-tick" points="9,14 12.5,17.5 19,10"/>
          </svg>
        </div>

        <!-- X -->
        <div class="btn-x">
          <svg viewBox="0 0 28 28" fill="none">
            <circle class="x-circle" cx="14" cy="14" r="10"
                    transform="rotate(-90 14 14)"/>
            <g class="x-lines">
              <line x1="10" y1="10" x2="18" y2="18"/>
              <line x1="18" y1="10" x2="10" y2="18"/>
            </g>
          </svg>
        </div>

      </button>
    </div>
  </form>
</div>

<script>
  const API_BASE = `http://${window.location.hostname}:5256`;

  function clearFieldError(errorId, inputId) {
    document.getElementById(errorId)?.classList.remove('show');
    document.getElementById(inputId)?.classList.remove('inp-error');
  }

  function showFieldError(errorId, inputId, msg) {
    const errEl = document.getElementById(errorId);
    const inp   = document.getElementById(inputId);
    document.getElementById(errorId + 'Text').textContent = msg;
    errEl?.classList.add('show');
    inp?.classList.add('inp-error');
    inp?.focus();
  }

  /* ── Button state machine ── */
  function setBtn(state) {
    const btn  = document.getElementById('submitBtn');
    const wrap = document.getElementById('btnWrap');
    btn.classList.remove('loading', 'btn-success', 'btn-fail');
    wrap.classList.remove('glow-success', 'glow-fail');
    btn.disabled = false;

    if (state === 'loading') {
      btn.classList.add('loading');
      btn.disabled = true;
    } else if (state === 'success') {
      btn.classList.add('btn-success');
      btn.disabled = true;
      setTimeout(() => wrap.classList.add('glow-success'), 200);
    } else if (state === 'fail') {
      btn.classList.add('btn-fail');
      btn.disabled = true;
      setTimeout(() => wrap.classList.add('glow-fail'), 200);
      // reset after 2s
      setTimeout(() => {
        btn.classList.remove('btn-fail');
        wrap.classList.remove('glow-fail');
        btn.disabled = false;
      }, 2000);
    }
  }

  /* Ripple on click */
  document.getElementById('submitBtn').addEventListener('click', function(e) {
    if (this.disabled) return;
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top  - size / 2;
    const ripple = document.createElement('span');
    ripple.className = 'btn-ripple';
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);
  });

  /* ── Main login handler ── */
  async function handleLogin(event) {
    event.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    clearFieldError('emailError',    'email');
    clearFieldError('passwordError', 'password');

    if (!email) { showFieldError('emailError', 'email', 'يرجى إدخال البريد الإلكتروني'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('emailError', 'email', 'صيغة البريد الإلكتروني غير صحيحة'); return; }
    if (!password) { showFieldError('passwordError', 'password', 'يرجى إدخال كلمة المرور'); return; }
    if (password.length < 4) { showFieldError('passwordError', 'password', 'كلمة المرور قصيرة جداً'); return; }

    setBtn('loading');

    try {
      let response = await fetch(`${API_BASE}/api/Auth/login/staff`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      let data = await response.json().catch(() => ({}));

      if (!response.ok) {
        response = await fetch(`${API_BASE}/api/Auth/login/buyer`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        data = await response.json().catch(() => ({}));
      }

      if (response.ok && data.token) {
        localStorage.setItem('authData', JSON.stringify({
          id:        data.id,
          email:     data.email,
          role:      data.role,
          firstName: data.firstName,
          token:     data.token
        }));

        setBtn('success');

        // fade out & redirect
        setTimeout(() => {
          document.body.style.cssText += 'opacity:0;transition:opacity .5s ease';
          const pages = {
            Admin:          '/Admin/index.html',
            BookingManager: '/BookingManager/index.html',
            SiteEngineer:   '/SiteEngineer/index.html',
            Buyer:          './Buyer/index.html'
          };
          setTimeout(() => { window.location.href = pages[data.role] || './login.html'; }, 500);
        }, 1400);

      } else {
        setBtn('fail');
        // shake the card too
        const card = document.getElementById('loginForm');
        card.classList.remove('shake');
        void card.offsetHeight;
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 500);

        document.getElementById('password').classList.add('inp-error');
        setTimeout(() => document.getElementById('password')?.focus(), 100);
      }

    } catch {
      setBtn('fail');
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      document.documentElement.style.opacity    = '1';
      document.documentElement.style.visibility = 'visible';
      document.documentElement.style.transition = 'opacity 0.45s ease';
    }, 40);
  });

  document.getElementById('password')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
  });
</script>
</body>
</html>
