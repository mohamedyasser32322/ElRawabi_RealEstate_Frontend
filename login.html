<!DOCTYPE html>
<html lang="ar" dir="rtl" style="opacity:0;visibility:hidden;background:#0a1a30;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>تسجيل الدخول — الروابي للعقارات</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:      #34c759;
    --green-dark: #28a745;
    --danger:     #ff3b30;
    --muted:      #8fa3c0;
    --card:       rgba(17,41,82,0.55);
    --border:     rgba(255,255,255,0.1);
    --ease:       all 0.4s cubic-bezier(0.23,1,0.32,1);
  }

  html, body {
    width: 100%; min-height: 100%;
    background: #0a1a30;
    font-family: 'Tajawal', sans-serif;
    color: #fff;
    direction: rtl;
    overflow-x: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100svh;           /* safe area on mobile */
    padding: 20px 16px;
    opacity: 0;
    animation: pageFadeIn 0.8s ease forwards;
    position: relative;
  }

  @keyframes pageFadeIn { to { opacity: 1; } }

  /* ── Background ── */
  .bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 60% 30%, #162e55 0%, #0a1a30 70%);
  }
  .blob {
    position: absolute; filter: blur(80px);
    opacity: .08; border-radius: 50%;
  }
  .b1 {
    width: clamp(200px, 50vw, 480px);
    height: clamp(200px, 50vw, 480px);
    background: #fff; top: -20%; right: -15%;
    animation: f1 20s ease-in-out infinite;
  }
  .b2 {
    width: clamp(160px, 40vw, 360px);
    height: clamp(160px, 40vw, 360px);
    background: #34c759; bottom: -15%; left: -10%;
    animation: f2 25s ease-in-out infinite reverse;
  }
  @keyframes f1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(60px,30px) scale(1.08)} }
  @keyframes f2 { 0%,100%{transform:translate(0,0) scale(1.08)} 50%{transform:translate(-50px,-40px) scale(1)} }

  /* ── Back button ── */
  .back-btn {
    position: fixed; top: 20px; right: 20px;
    display: flex; align-items: center; gap: 7px;
    color: var(--muted); text-decoration: none;
    font-weight: 600; font-size: .85rem;
    padding: 8px 14px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 11px;
    transition: var(--ease); z-index: 200;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .back-btn svg { width: 15px; height: 15px; transition: transform .3s ease; flex-shrink: 0; }
  .back-btn:hover {
    color: #fff;
    background: rgba(255,255,255,.09);
    border-color: rgba(255,255,255,.18);
    transform: translateX(-3px);
  }
  .back-btn:hover svg { transform: translateX(3px); }

  /* ── Wrapper ── */
  .wrapper {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    padding-top: 8px;
  }

  /* ── Header ── */
  .header {
    text-align: center; margin-bottom: 28px;
    animation: slideDown .7s cubic-bezier(0.23,1,0.32,1) both;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo-mark {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 10px 24px rgba(52,199,89,.3);
  }
  .logo-mark svg { width: 26px; height: 26px; fill: #fff; }
  .logo { font-size: clamp(1.4rem, 5vw, 1.7rem); font-weight: 800; letter-spacing: -.5px; margin-bottom: 5px; }
  .header p { color: var(--muted); font-size: clamp(.82rem, 3vw, .9rem); }

  /* ── Card ── */
  .card {
    background: var(--card);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-radius: 22px;
    border: 1px solid var(--border);
    padding: clamp(24px, 6vw, 40px);
    box-shadow: 0 24px 56px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.07);
    animation: cardPop .7s cubic-bezier(0.34,1.4,0.64,1) .1s both;
  }
  @keyframes cardPop {
    from { opacity: 0; transform: scale(.93) translateY(28px); }
    to   { opacity: 1; transform: scale(1)   translateY(0); }
  }

  /* ── Form groups ── */
  .g { margin-bottom: 18px; opacity: 0; animation: fadeInR .5s ease forwards; }
  .g:nth-child(1) { animation-delay: .3s; }
  .g:nth-child(2) { animation-delay: .4s; }
  @keyframes fadeInR {
    from { opacity: 0; transform: translateX(14px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  label.lbl {
    display: block; color: rgba(255,255,255,.8);
    font-weight: 600; font-size: .83rem; margin-bottom: 7px;
  }
  .inp {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1.5px solid rgba(255,255,255,.1);
    padding: 13px 15px;
    border-radius: 12px;
    color: #fff; font-family: inherit; font-size: .92rem;
    transition: var(--ease);
    /* Prevent iOS zoom on focus (font-size >= 16px) */
    font-size: max(.92rem, 16px);
  }
  .inp::placeholder { color: rgba(255,255,255,.22); }
  .inp:focus {
    outline: none;
    background: rgba(255,255,255,.08);
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(52,199,89,.18);
    transform: translateY(-1px);
  }
  /* Fix autofill color on Chrome/Safari */
  .inp:-webkit-autofill,
  .inp:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 100px #112952 inset !important;
    -webkit-text-fill-color: #fff !important;
    caret-color: #fff;
  }

  /* ── Footer row ── */
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    margin: 16px 0 22px;
    flex-wrap: wrap; gap: 8px;
    opacity: 0; animation: fadeIn .5s ease .5s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .remember {
    display: flex; align-items: center; gap: 7px;
    cursor: pointer; color: var(--muted);
    font-size: .82rem; transition: color .3s ease;
    user-select: none;
  }
  .remember input { width: 15px; height: 15px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
  .remember:hover { color: #fff; }
  .forgot { color: var(--muted); font-size: .82rem; text-decoration: none; transition: color .3s ease; }
  .forgot:hover { color: var(--green); }

  /* ── Submit button ── */
  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff; border: none;
    padding: 14px;
    border-radius: 13px;
    cursor: pointer; font-family: inherit;
    font-weight: 700; font-size: .95rem;
    transition: var(--ease);
    position: relative; overflow: hidden;
    box-shadow: 0 8px 22px rgba(52,199,89,.28);
    opacity: 0; animation: fadeInUp .5s ease .6s forwards;
    /* Touch friendly */
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 14px 28px rgba(52,199,89,.38);
  }
  .btn:active:not(:disabled) { transform: scale(.985); }
  .btn::after {
    content: ''; position: absolute;
    top: -50%; left: -60%;
    width: 20%; height: 200%;
    background: rgba(255,255,255,.16);
    transform: rotate(30deg); transition: .5s;
  }
  .btn:hover::after { left: 120%; }
  .btn.loading { color: transparent; pointer-events: none; }
  .btn.loading::before {
    content: ''; position: absolute;
    width: 20px; height: 20px;
    top: 50%; left: 50%; margin: -10px 0 0 -10px;
    border: 2.5px solid rgba(255,255,255,.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast-container {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9999;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    pointer-events: none;
    width: auto; max-width: min(90vw, 380px);
  }
  .toast {
    display: flex; align-items: center; gap: 11px;
    padding: 12px 16px; border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: .88rem; font-weight: 600;
    width: 100%;
    pointer-events: all;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid;
    opacity: 0; transform: translateY(-10px) scale(.95);
    transition: opacity .3s ease, transform .35s cubic-bezier(0.34,1.4,0.64,1);
    position: relative; overflow: hidden;
  }
  .toast.show { opacity: 1; transform: translateY(0) scale(1); }
  .toast.hide { opacity: 0; transform: translateY(-8px) scale(.96); transition: opacity .25s ease, transform .25s ease; }
  .toast.success { background: rgba(16,36,20,.93); border-color: rgba(52,199,89,.35); color: #52d96f; }
  .toast.error   { background: rgba(36,14,12,.93); border-color: rgba(255,59,48,.35);  color: #ff7b72; }
  .toast-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
  .toast.success .toast-icon { background: rgba(52,199,89,.2); }
  .toast.error   .toast-icon { background: rgba(255,59,48,.2); }
  .toast-body { flex: 1; }
  .toast-title { font-size: .9rem; font-weight: 700; margin-bottom: 1px; }
  .toast-sub   { font-size: .77rem; opacity: .8; font-weight: 400; }
  .toast-close { opacity: .45; cursor: pointer; font-size: 15px; padding: 4px; transition: opacity .2s; flex-shrink: 0; }
  .toast-close:hover { opacity: 1; }
  .toast-prog {
    position: absolute; bottom: 0; right: 0; height: 3px;
    border-radius: 0 0 14px 14px;
    transition: width linear;
  }
  .toast.success .toast-prog { background: var(--green); }
  .toast.error   .toast-prog { background: var(--danger); }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .back-btn { top: 14px; right: 14px; padding: 7px 11px; font-size: .8rem; }
    .wrapper  { padding-top: 52px; }  /* room for back button */
    .logo-mark { width: 48px; height: 48px; border-radius: 14px; }
    .logo-mark svg { width: 22px; height: 22px; }
    .header { margin-bottom: 22px; }
  }

  @media (max-height: 600px) and (orientation: landscape) {
    body { align-items: flex-start; padding-top: 12px; }
    .header { margin-bottom: 16px; }
    .logo-mark { width: 44px; height: 44px; margin-bottom: 10px; }
    .g { margin-bottom: 12px; }
    .footer { margin: 10px 0 14px; }
  }
</style>
</head>
<body>

<div class="bg"><div class="blob b1"></div><div class="blob b2"></div></div>
<div id="toast-container"></div>

<a href="interface.html" class="back-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
  عودة للرئيسية
</a>

<div class="wrapper">
  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9" fill="rgba(0,0,0,.2)"/>
      </svg>
    </div>
    <div class="logo">الروابي للعقارات</div>
    <p>مرحباً بك، سجّل دخولك للمتابعة</p>
  </div>

  <form class="card" id="loginForm" onsubmit="handleLogin(event)" novalidate>
    <div class="g">
      <label class="lbl" for="email">البريد الإلكتروني</label>
      <input type="email" id="email" class="inp"
             placeholder="example@domain.com"
             required autocomplete="email"
             inputmode="email"/>
    </div>
    <div class="g">
      <label class="lbl" for="password">كلمة المرور</label>
      <input type="password" id="password" class="inp"
             placeholder="••••••••"
             required autocomplete="current-password"/>
    </div>

    <div class="footer">
      <label class="remember">
        <input type="checkbox" id="rememberMe"/>
        <span>تذكرني</span>
      </label>
      <a href="#" class="forgot">نسيت كلمة المرور؟</a>
    </div>

    <button type="submit" class="btn" id="submitBtn">تسجيل الدخول</button>
  </form>
</div>

<script>
  const API_BASE = `http://${window.location.hostname}:5256`;
  let _toastN = 0;

  /* ── Toast ── */
  function showToast(title, sub, type, duration = 4000) {
    const c   = document.getElementById('toast-container');
    const id  = 't' + _toastN++;
    const ico = type === 'success' ? '✓' : '✕';
    const el  = document.createElement('div');
    el.className = `toast ${type}`;
    el.id = id;
    el.innerHTML = `
      <div class="toast-icon">${ico}</div>
      <div class="toast-body">
        <div class="toast-title">${title}</div>
        ${sub ? `<div class="toast-sub">${sub}</div>` : ''}
      </div>
      <div class="toast-close" onclick="dismissToast('${id}')">✕</div>
      <div class="toast-prog" id="prog-${id}" style="width:100%"></div>
    `;
    c.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
    const prog = document.getElementById('prog-' + id);
    if (prog) {
      prog.style.transition = `width ${duration}ms linear`;
      requestAnimationFrame(() => requestAnimationFrame(() => prog.style.width = '0%'));
    }
    el._timer = setTimeout(() => dismissToast(id), duration);
    return id;
  }

  function dismissToast(id) {
    const el = document.getElementById(id);
    if (!el) return;
    clearTimeout(el._timer);
    el.classList.remove('show');
    el.classList.add('hide');
    setTimeout(() => el.remove(), 300);
  }

  /* ── Login ── */
  async function handleLogin(event) {
    event.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');

    /* Basic client validation */
    if (!email || !password) {
      showToast('يرجى ملء جميع الحقول', '', 'error', 3000);
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      /* Try staff login first, then buyer */
      let response = await fetch(`${API_BASE}/api/Auth/login/staff`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password })
      });
      let data = await response.json().catch(() => ({}));

      if (!response.ok) {
        response = await fetch(`${API_BASE}/api/Auth/login/buyer`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });
        data = await response.json().catch(() => ({}));
      }

      if (response.ok && data.token) {
        /* Save Remember Me */
        const remember = document.getElementById('rememberMe').checked;
        localStorage.setItem('rememberMe',  remember);
        if (remember) localStorage.setItem('savedEmail', email);
        else          localStorage.removeItem('savedEmail');

        /* Save auth data */
        localStorage.setItem('authData', JSON.stringify({
          id:    data.id,
          email: data.email,
          role:  data.role,
          token: data.token
        }));

        showToast('تم تسجيل الدخول بنجاح', 'جاري تحويلك...', 'success', 2200);

        setTimeout(() => {
          document.body.style.cssText += 'opacity:0;transition:opacity .5s ease';
          const pages = {
            Admin:          '/Admin/index.html',
            BookingManager: '/BookingManager/index.html',
            SiteEngineer:   './site-engineer-dashboard.html',
            Buyer:          './Buyer/index.html'
          };
          setTimeout(() => {
            window.location.href = pages[data.role] || './login.html';
          }, 500);
        }, 1600);

      } else {
        const msg = data.message || data.title || 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
        showToast('فشل تسجيل الدخول', msg, 'error');
      }

    } catch {
      showToast('خطأ في الاتصال', 'تعذّر الوصول إلى الخادم، يرجى المحاولة لاحقاً', 'error');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  /* ── Remember Me restore ── */
  window.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('rememberMe') === 'true') {
      const saved = localStorage.getItem('savedEmail') || '';
      document.getElementById('email').value         = saved;
      document.getElementById('rememberMe').checked  = true;
    }

    /* Show page */
    setTimeout(() => {
      document.documentElement.style.opacity    = '1';
      document.documentElement.style.visibility = 'visible';
      document.documentElement.style.transition = 'opacity 0.45s ease';
    }, 40);
  });

  /* ── Enter key on password → submit ── */
  document.getElementById('password')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
  });
</script>
</body>
</html>
