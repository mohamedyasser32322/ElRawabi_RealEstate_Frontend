<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الروابي للعقارات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0D2142;
      --light:   #FFFFFF;
      --card-bg: #112952;
      --text-muted: #8fa3c0;
      --success: #34c759;
      --warning: #ffcc00;
      --danger: #ff3b30;
      --gray: #8e8e93;
      --modal-overlay: rgba(0, 0, 0, 0.85);
      --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--primary); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; border: 2px solid var(--primary); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--primary);
      color: var(--light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn  { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:scale(1); } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(13,33,66,0.97);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      transition: var(--transition);
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 40px;
    }

    .nav-logo {
      font-size: 1.5rem; font-weight: 800; color: var(--light);
      cursor: pointer;
      transition: var(--transition);
    }
    .nav-logo:hover { opacity: 0.75; transform: scale(1.02); }

    .nav-right { display: flex; align-items: center; gap: 15px; }
    .login-btn {
      background: transparent; color: var(--light);
      border: 1px solid rgba(255,255,255,0.5);
      padding: 8px 22px; border-radius: 10px;
      text-decoration: none; font-weight: 600; white-space: nowrap;
      transition: var(--transition);
    }
    .login-btn:hover { background: var(--light); color: var(--primary); transform: translateY(-2px); border-color: var(--light); }

    .header-titles {
      padding: 14px 40px 0;
      text-align: center;
      overflow: hidden;
    }
    .header-titles h1 {
      font-size: 1.8rem; font-weight: 800; color: var(--light);
      margin-bottom: 4px;
      transition: var(--transition);
    }
    .header-titles p {
      color: var(--text-muted); font-size: 1rem;
      transition: var(--transition);
    }

    .search-container {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 14px 40px;
    }
    .search-wrapper {
      width: 100%; max-width: 600px;
      position: relative; display: flex; align-items: center;
    }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 40px 10px 15px;
      border-radius: 12px; color: var(--light);
      font-family: inherit; font-size: 0.9rem;
      transition: var(--transition);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      outline: none;
      background: rgba(255,255,255,0.11);
      border-color: rgba(255,255,255,0.32);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
    }
    .search-icon { position: absolute; left: 12px; opacity: 0.45; pointer-events: none; font-size: 0.95rem; }

    .breadcrumb {
      padding: 9px 40px 10px;
      display: flex; gap: 10px; font-size: 0.82rem;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      animation: slideDown 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .breadcrumb span {
      cursor: pointer; opacity: 0.6;
      transition: var(--transition);
    }
    .breadcrumb span:hover { opacity: 1; }
    .breadcrumb .sep { color: var(--text-muted); cursor: default; opacity: 0.35; }
    .breadcrumb .current { color: var(--light); font-weight: 700; cursor: default; opacity: 1; }

    .filter-container {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 40px;
      max-height: 0; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1),
                  padding 0.35s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.35s ease;
      opacity: 0;
    }
    .filter-container.active {
      max-height: 80px;
      padding: 12px 40px;
      opacity: 1;
      animation: slideDown 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .filter-btn {
      background: rgba(255,255,255,0.06);
      color: var(--light);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 8px 20px; border-radius: 20px;
      cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.88rem;
      transition: var(--transition);
    }
    .filter-btn:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .filter-btn.active       { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.5); }
    .filter-btn.active.avail { background: rgba(52,199,89,0.18); color: var(--success); border-color: var(--success); }
    .filter-btn.active.resrv { background: rgba(255,204,0,0.15); color: var(--warning); border-color: var(--warning); }
    .filter-btn.active.sold  { background: rgba(255,59,48,0.18); color: var(--danger); border-color: var(--danger); }

    /* ── CONTAINER ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 30px 30px 80px; }

    #mainView {
      transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.4s cubic-bezier(0.4,0,0.2,1);
      will-change: opacity, transform;
    }
    #mainView.out { opacity: 0; transform: translateY(15px); }
    #mainView.in  { opacity: 1; transform: translateY(0); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 26px; }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 28px; cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.48s cubic-bezier(0.4,0,0.2,1) forwards;
      transition: var(--transition);
      will-change: transform;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.025);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 22px 48px rgba(0,0,0,0.5);
      background: rgba(255,255,255,0.04);
    }
    .card h3 { font-size: 1.4rem; margin-bottom: 10px; color: var(--light); }
    .card .meta { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 5px; }
    .card .desc { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.55; }
    .card .stats {
      display: flex; justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.06); padding-top: 16px; gap: 4px;
    }
    .stat-box { text-align: center; flex: 1; }
    .stat-number { font-weight: 800; font-size: 1.1rem; margin-bottom: 2px; transition: var(--transition); }
    .card:hover .stat-number { transform: scale(1.06); }
    .stat-label  { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-total    .stat-number { color: var(--light); }
    .stat-total    .stat-label  { color: var(--text-muted); }
    .stat-available .stat-number { color: var(--success); }
    .stat-available .stat-label  { color: var(--success); }
    .stat-reserved  .stat-number { color: var(--warning); }
    .stat-reserved  .stat-label  { color: var(--warning); }
    .stat-sold      .stat-number { color: var(--danger); }
    .stat-sold      .stat-label  { color: var(--danger); }

    .building-map { display: flex; flex-direction: column-reverse; gap: 18px; }

    .floor-row {
      background: rgba(255,255,255,0.02);
      border-radius: 15px; padding: 22px;
      display: flex; align-items: center; gap: 22px;
      border: 1px solid rgba(255,255,255,0.05);
      opacity: 0;
      animation: fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
      transition: var(--transition);
    }
    .floor-row:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }

    .floor-label {
      min-width: 110px; font-weight: 800; color: var(--light); font-size: 1.15rem;
      border-left: 3px solid rgba(255,255,255,0.28); padding-left: 16px;
    }
    .units-list { display: flex; flex-wrap: wrap; gap: 13px; flex: 1; }

    .unit-box {
      width: 110px; min-height: 106px; border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 11px; text-align: center; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      transition: var(--transition);
      will-change: transform;
    }
    .unit-box:hover {
      transform: translateY(-5px) scale(1.09);
      background: rgba(255,255,255,0.14);
      border-color: white;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }
    .unit-num { font-weight: 800; font-size: 1rem; margin-bottom: 4px; }
    .unit-info { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; }
    .price { font-size: 0.75rem; color: var(--light); font-weight: 600; }

    .status-available { background: rgba(52,199,89,0.1); color: #34c759; border-color: rgba(52,199,89,0.3); }
    .status-reserved  { background: rgba(255,204,0,0.1); color: #ffcc00; border-color: rgba(255,204,0,0.3); }
    .status-sold      { background: rgba(255,59,48,0.1); color: #ff3b30; border-color: rgba(255,59,48,0.3); }

    .single-unit-display {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 24px;
      opacity: 0;
      animation: fadeUp 0.48s cubic-bezier(0.4,0,0.2,1) forwards;
      transition: var(--transition);
    }
    .single-unit-display:hover {
      transform: translateY(-8px);
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    .single-unit-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .single-unit-header h2 { font-size: 1.2rem; color: var(--light); }
    .single-unit-info {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px; margin-bottom: 18px;
    }
    .info-block {
      background: rgba(255,255,255,0.02);
      padding: 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .info-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
    .info-value { font-size: 0.95rem; color: var(--light); font-weight: 600; }
    .detail-btn { text-align: center; }
    .detail-btn button {
      background: rgba(52,199,89,0.15); color: var(--success);
      border: 1px solid var(--success); padding: 10px 28px;
      border-radius: 20px; cursor: pointer; font-family: inherit;
      font-weight: 600; font-size: 0.9rem;
      transition: var(--transition);
    }
    .detail-btn button:hover { background: rgba(52,199,89,0.25); transform: translateY(-2px); }

    .pagination {
      display: flex; justify-content: center; gap: 8px;
      margin-top: 40px; flex-wrap: wrap;
    }
    .page-btn {
      background: rgba(255,255,255,0.06);
      color: var(--light);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font-family: inherit; font-weight: 600;
      font-size: 0.85rem;
      transition: var(--transition);
    }
    .page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .page-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .loader-container { display: flex; justify-content: center; align-items: center; padding: 100px 20px; }
    .spinner {
      width: 50px; height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .empty-msg {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 1rem;
    }

    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--modal-overlay);
      justify-content: center; align-items: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      animation: fadeIn 0.3s ease;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, var(--card-bg) 0%, rgba(17, 41, 82, 0.8) 100%);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.15);
      width: 90%; max-width: 550px;
      max-height: 85vh;
      overflow-y: auto;
      animation: scaleIn 0.35s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    }
    .modal-close {
      position: absolute; top: 18px; left: 18px;
      font-size: 1.8rem; color: var(--light);
      cursor: pointer; opacity: 0.6;
      transition: var(--transition);
      z-index: 10;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .modal-close:hover { 
      opacity: 1; 
      background: rgba(255,59,48,0.2);
      transform: rotate(90deg);
    }
    .modal-header {
      padding: 32px 32px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
      border-radius: 24px 24px 0 0;
    }
    .modal-header h2 { 
      font-size: 1.5rem; 
      margin-bottom: 12px; 
      color: var(--light);
      font-weight: 800;
    }
    .unit-status { display: flex; gap: 10px; }
    .modal-body { padding: 28px 32px; }
    .detail-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      opacity: 0;
      animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
      transition: var(--transition);
    }
    .detail-item:hover {
      background: rgba(255,255,255,0.02);
      padding: 16px 12px;
      border-radius: 8px;
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-label {
      color: var(--text-muted); font-size: 0.95rem; font-weight: 600;
      min-width: 120px;
    }
    .detail-value {
      color: var(--light); font-size: 1.05rem; font-weight: 700;
      text-align: left;
    }
    .status-badge {
      display: inline-block; padding: 8px 18px;
      border-radius: 20px; font-size: 0.9rem;
      font-weight: 700; border: 1.5px solid;
      transition: var(--transition);
    }
    .status-badge.available { background: rgba(52,199,89,0.15); color: var(--success); border-color: var(--success); }
    .status-badge.reserved  { background: rgba(255,204,0,0.15); color: var(--warning); border-color: var(--warning); }
    .status-badge.sold      { background: rgba(255,59,48,0.15); color: var(--danger); border-color: var(--danger); }

    @media (max-width: 768px) {
      nav { padding: 12px 20px; flex-wrap: wrap; }
      .header-titles { padding: 12px 20px; }
      .header-titles h1 { font-size: 1.4rem; }
      .search-container { padding: 10px 20px; }
      .filter-container { padding: 0 20px; }
      .filter-container.active { padding: 10px 20px; }
      .breadcrumb { padding: 8px 20px; font-size: 0.75rem; }
      .container { padding: 20px 20px 60px; }
      .grid { grid-template-columns: 1fr; gap: 18px; }
      .floor-row { flex-direction: column; align-items: flex-start; gap: 16px; }
      .floor-label { border-left: none; border-bottom: 2px solid rgba(255,255,255,0.2); padding-left: 0; padding-bottom: 10px; margin-bottom: 12px; }
      .units-list { width: 100%; }
      .modal-content { width: 95%; max-width: 95vw; }
      .modal-header { padding: 24px 20px 16px; }
      .modal-body { padding: 20px; }
      .single-unit-info { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="nav-logo" onclick="showProjects()">الروابي للعقارات</div>
      <div class="nav-right">
        <a href="/login.html" class="login-btn">تسجيل الدخول</a>
      </div>
    </nav>

    <div class="header-titles">
      <h1 id="mainTitle">مشاريعنا العقارية</h1>
      <p id="subTitle">اختر المشروع لتصفح المباني والوحدات المتاحة</p>
    </div>

    <div class="search-container">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن مشروع أو موقع..." oninput="handleSearch()">
      </div>
    </div>

    <div class="breadcrumb" id="breadcrumb">
      <span class="current">المشاريع</span>
    </div>

    <div class="filter-container" id="filterContainer">
      <div class="filter-buttons">
        <button class="filter-btn active" onclick="setUnitFilter('all', this)">الكل</button>
        <button class="filter-btn" onclick="setUnitFilter('available', this)">متاح</button>
        <button class="filter-btn" onclick="setUnitFilter('reserved', this)">محجوز</button>
        <button class="filter-btn" onclick="setUnitFilter('sold', this)">مباع</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="mainView"></div>
    <div id="pagination" class="pagination"></div>
  </div>

  <div class="modal" id="unitModal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <div class="modal-header">
        <h2 id="modalUnitTitle">تفاصيل الوحدة</h2>
        <div class="unit-status" id="modalUnitStatus"></div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

<script>
  const API_BASE = `http://${window.location.hostname}:5256`
  const ITEMS_PER_PAGE = 9;


  let state = {
    view: 'projects',
    data: [],
    filteredData: [],
    currentPage: 1,
    params: {},
    unitFilter: 'all',
    _transitioning: false
  };

  function showLoader() {
    document.getElementById('mainView').innerHTML = `<div class="loader-container"><div class="spinner"></div></div>`;
    document.getElementById('pagination').innerHTML = '';
  }

  async function swapContent(renderFn) {
    if (state._transitioning) return;
    state._transitioning = true;
    const v = document.getElementById('mainView');
    v.style.transition = 'opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.4s cubic-bezier(0.4,0,0.2,1)';
    v.classList.add('out');
    await sleep(400);
    renderFn();
    v.classList.remove('out');
    v.classList.add('in');
    await sleep(400);
    v.classList.remove('in');
    state._transitioning = false;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function updateHeader(title, subtitle) {
    const t = document.getElementById('mainTitle');
    const s = document.getElementById('subTitle');
    t.style.transition = s.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    t.style.opacity = s.style.opacity = '0';
    t.style.transform = s.style.transform = 'translateY(-8px)';
    setTimeout(() => {
      t.innerText = title;
      s.innerText = subtitle;
      t.style.transform = s.style.transform = 'translateY(6px)';
      t.style.opacity = s.style.opacity = '1';
      t.style.transform = s.style.transform = 'translateY(0)';
    }, 300);
  }

  function updateSearchPlaceholder(ph) {
    const el = document.getElementById('searchInput');
    el.style.transition = 'opacity 0.2s ease';
    el.style.opacity = '0';
    setTimeout(() => { el.placeholder = ph; el.value = ''; el.style.opacity = '1'; }, 200);
  }

  async function apiFetch(endpoint) {
    const token = localStorage.getItem('token') || '';
    try {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        headers: token ? { Authorization: `Bearer ${token}` } : {}
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch(e) { console.error(e); return null; }
  }

  function arr(v) {
    return Array.isArray(v) ? v : (v?.data || v?.items || []);
  }

  function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

  function translateUnitType(type) {
    return UNIT_TYPES[type] || type;
  }

  // ───── SEARCH ─────
  let _searchTimer = null;
  function handleSearch() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(_doSearch, 160);
  }

  function _doSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (state.view === 'projects') {
      state.filteredData = state.data.filter(p =>
        (p.name||'').toLowerCase().includes(q) || (p.location||'').toLowerCase().includes(q));
    } else if (state.view === 'buildings') {
      state.filteredData = state.data.filter(b => (b.name||'').toLowerCase().includes(q));
    } else if (state.view === 'units') {
      state.filteredData = state.data.filter(f => {
        const fu = (state.params.units||[]).filter(u => {
          if (Number(u.floorId) !== Number(f.id)) return false;
          const matchFilter = state.unitFilter === 'all' || (u.status||'').toLowerCase() === state.unitFilter;
          const matchSearch = !q || (u.unitNumber||'').toString().toLowerCase().includes(q);
          return matchFilter && matchSearch;
        });
        return fu.length > 0;
      });
    }
    state.currentPage = 1;
    swapContent(renderCurrentView);
  }

  // ───── UNIT FILTER ─────
  function setUnitFilter(filter, btn) {
    state.unitFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    btn.classList.add('active');
    if (filter === 'available') btn.classList.add('avail');
    if (filter === 'reserved')  btn.classList.add('resrv');
    if (filter === 'sold')      btn.classList.add('sold');
    _doSearch();
  }

  // ───── PAGINATION ─────
  function renderPagination(total) {
    const pages = Math.ceil(total / ITEMS_PER_PAGE);
    const div   = document.getElementById('pagination');
    if (pages <= 1) { div.innerHTML = ''; return; }
    let h = `<button class="page-btn" onclick="goToPage(${state.currentPage-1})" ${state.currentPage===1?'disabled':''}>السابق</button>`;
    for (let i=1; i<=pages; i++)
      h += `<button class="page-btn ${state.currentPage===i?'active':''}" onclick="goToPage(${i})">${i}</button>`;
    h += `<button class="page-btn" onclick="goToPage(${state.currentPage+1})" ${state.currentPage===pages?'disabled':''}>التالي</button>`;
    div.innerHTML = h;
  }

  function goToPage(page) {
    if (state._transitioning) return;
    state.currentPage = page;
    swapContent(renderCurrentView);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ───── STATUS MAPS ─────
  const ST_AR   = { Available:'متاح', Reserved:'محجوز', Sold:'مباع', Closed:'مغلق' };
  const ST_CSS  = { Available:'status-available', Reserved:'status-reserved', Sold:'status-sold', Closed:'status-sold' };
  const ST_BADGE = { Available:'available', Reserved:'reserved', Sold:'sold', Closed:'sold' };

  // ───── RENDER ─────
  function renderCurrentView() {
    const start    = (state.currentPage - 1) * ITEMS_PER_PAGE;
    const pageData = state.filteredData.slice(start, start + ITEMS_PER_PAGE);
    const c        = document.getElementById('mainView');
    const q        = document.getElementById('searchInput').value.toLowerCase().trim();

    /* ─ PROJECTS ─ */
    if (state.view === 'projects') {
      if (!pageData.length) { c.innerHTML = '<div class="empty-msg">لا توجد مشاريع مطابقة للبحث</div>'; renderPagination(0); return; }
      let h = '<div class="grid">';
      pageData.forEach((p, i) => {
        h += `
          <div class="card" style="animation-delay:${i*55}ms"
               onclick="showBuildings(${p.id},'${esc(p.name)}')">
            <h3>${p.name}</h3>
            <div class="meta">📍 ${p.location}</div>
            <p class="desc">${p.description
              ? (p.description.length > 90 ? p.description.slice(0,90)+'…' : p.description)
              : 'مشروع عقاري متميز في موقع استراتيجي'}</p>
            <div class="stats">
              <div class="stat-box stat-total">
                <div class="stat-number">${p.totalUnits??0}</div>
                <div class="stat-label">وحدات</div>
              </div>
              <div class="stat-box stat-available">
                <div class="stat-number">${p.availableUnits??0}</div>
                <div class="stat-label">متاح</div>
              </div>
              <div class="stat-box stat-reserved">
                <div class="stat-number">${p.reservedUnits??0}</div>
                <div class="stat-label">محجوز</div>
              </div>
              <div class="stat-box stat-sold">
                <div class="stat-number">${p.soldUnits??0}</div>
                <div class="stat-label">مباع</div>
              </div>
            </div>
          </div>`;
      });
      h += '</div>';
      c.innerHTML = h;
      renderPagination(state.filteredData.length);

    /* ─ BUILDINGS ─ */
    } else if (state.view === 'buildings') {
      if (!pageData.length) { c.innerHTML = '<div class="empty-msg">لا توجد مبانٍ مطابقة</div>'; renderPagination(0); return; }
      let h = '<div class="grid">';
      pageData.forEach((b, i) => {
        h += `
          <div class="card" style="animation-delay:${i*55}ms"
               onclick="showUnits(${b.id},'${esc(b.name)}',${state.params.projectId},'${esc(state.params.projectName)}')">
            <h3>${b.name}</h3>
            <div class="meta">🏗️ نسبة الإنجاز: ${b.progress??0}%</div>
            <div class="stats">
              <div class="stat-box stat-total">
                <div class="stat-number">${b.totalUnits??0}</div>
                <div class="stat-label">وحدات</div>
              </div>
              <div class="stat-box stat-available">
                <div class="stat-number">${b.availableUnits??0}</div>
                <div class="stat-label">متاح</div>
              </div>
              <div class="stat-box stat-reserved">
                <div class="stat-number">${b.reservedUnits??0}</div>
                <div class="stat-label">محجوز</div>
              </div>
              <div class="stat-box stat-sold">
                <div class="stat-number">${b.soldUnits??0}</div>
                <div class="stat-label">مباع</div>
              </div>
            </div>
          </div>`;
      });
      h += '</div>';
      c.innerHTML = h;
      renderPagination(state.filteredData.length);

    /* ─ UNITS ─ */
    } else if (state.view === 'units') {
      const allUnits = state.params.units || [];
      const isSearching = q.length > 0;

      if (isSearching) {
        /* search result: flat list */
        let matched = [];
        state.filteredData.forEach(f => {
          const fu = allUnits.filter(u => {
            if (Number(u.floorId) !== Number(f.id)) return false;
            const mf = state.unitFilter === 'all' || (u.status||'').toLowerCase() === state.unitFilter;
            return mf && (u.unitNumber||'').toString().toLowerCase().includes(q);
          });
          matched = matched.concat(fu);
        });

        if (!matched.length) { c.innerHTML = '<div class="empty-msg">لا توجد وحدات مطابقة</div>'; renderPagination(0); return; }

        const paginated = matched.slice(start, start + ITEMS_PER_PAGE);
        let h = '';
        paginated.forEach((u, i) => {
          const bc   = ST_BADGE[u.status] || 'available';
          const stAr = ST_AR[u.status]    || u.status;
          const price = u.price ? Number(u.price).toLocaleString('ar-SA') : '—';
          h += `
            <div class="single-unit-display" style="animation-delay:${i*70}ms">
              <div class="single-unit-header">
                <h2>وحدة ${u.unitNumber}</h2>
                <span class="status-badge ${bc}">${stAr}</span>
              </div>
              <div class="single-unit-info">
                <div class="info-block"><div class="info-label">المساحة</div><div class="info-value">${u.area??'—'} م²</div></div>
                <div class="info-block"><div class="info-label">الغرف</div><div class="info-value">${u.rooms??'—'}</div></div>
                <div class="info-block"><div class="info-label">السعر</div><div class="info-value">${price}</div></div>
              </div>
              <div class="detail-btn">
                <button onclick='openModal(${JSON.stringify(u)})'>عرض التفاصيل الكاملة</button>
              </div>
            </div>`;
        });
        c.innerHTML = h;
        renderPagination(matched.length);

      } else {
        /* floor map */
        if (!pageData.length) { c.innerHTML = '<div class="empty-msg">لا توجد طوابق</div>'; renderPagination(0); return; }
        let h = '<div class="building-map">';
        let visibleFloors = 0;
        pageData.forEach((f, fi) => {
          const fu = allUnits.filter(u => {
            // ✅ FIX: استخدام Number() لضمان مقارنة صحيحة بين string و number
            if (Number(u.floorId) !== Number(f.id)) return false;
            return state.unitFilter === 'all' || (u.status||'').toLowerCase() === state.unitFilter;
          });
          if (!fu.length && state.unitFilter !== 'all') return;
          visibleFloors++;
          const floorName = f.floorNumber != null ? `الدور ${f.floorNumber}` : (f.name || `طابق ${fi+1}`);
          h += `<div class="floor-row" style="animation-delay:${visibleFloors*60}ms">
            <div class="floor-label">${floorName}</div>
            <div class="units-list">`;
          fu.forEach(u => {
            const css   = ST_CSS[u.status]  || 'status-available';
            const area  = u.area  ? `${u.area}م` : '—';
            const rooms = u.rooms ? `${u.rooms} غرف` : '';
            const price = u.price ? Number(u.price).toLocaleString('ar-SA') : '—';
            h += `
              <div class="unit-box ${css}" onclick='openModal(${JSON.stringify(u)})'>
                <div class="unit-num">${u.unitNumber}</div>
                <div class="unit-info">${area}${rooms?' | '+rooms:''}</div>
                <div class="price">${price}</div>
              </div>`;
          });
          h += '</div></div>';
        });
        h += '</div>';
        c.innerHTML = h;
        renderPagination(state.filteredData.length);
      }
    }
  }

  // ───── VIEW NAVIGATORS ─────
  async function showProjects() {
    state.view = 'projects'; state.currentPage = 1; state.unitFilter = 'all';
    updateSearchPlaceholder('ابحث عن مشروع أو موقع...');
    document.getElementById('filterContainer').classList.remove('active');
    document.getElementById('breadcrumb').innerHTML = '<span class="current">المشاريع</span>';
    updateHeader('مشاريعنا العقارية', 'اختر المشروع لتصفح المباني والوحدات المتاحة');
    showLoader();
    const data = await apiFetch('/api/Projects');
    state.data = arr(data);
    state.filteredData = [...state.data];
    swapContent(renderCurrentView);
  }

  async function showBuildings(projectId, projectName) {
    state.view = 'buildings'; state.currentPage = 1; state.unitFilter = 'all';
    state.params = { projectId: Number(projectId), projectName };
    updateSearchPlaceholder('ابحث عن اسم المبنى...');
    document.getElementById('filterContainer').classList.remove('active');
    document.getElementById('breadcrumb').innerHTML =
      `<span onclick="showProjects()">المشاريع</span>
       <span class="sep">/</span>
       <span class="current">${projectName}</span>`;
    updateHeader(`مباني ${projectName}`, 'اختر المبنى لعرض الأدوار وتفاصيل الوحدات');
    showLoader();
    const data = await apiFetch('/api/Buildings');
    // ✅ FIX: تحويل كلا الجانبين إلى Number لضمان صحة المقارنة
    state.data = arr(data).filter(b => Number(b.projectId) === Number(projectId));
    state.filteredData = [...state.data];
    swapContent(renderCurrentView);
  }

  async function showUnits(buildingId, buildingName, projectId, projectName) {
    state.view = 'units'; state.currentPage = 1; state.unitFilter = 'all';
    updateSearchPlaceholder('ابحث برقم الوحدة...');

    document.querySelectorAll('.filter-btn').forEach((b,i) => {
      b.className = 'filter-btn' + (i===0?' active':'');
    });
    document.getElementById('filterContainer').classList.add('active');

    document.getElementById('breadcrumb').innerHTML =
      `<span onclick="showProjects()">المشاريع</span>
       <span class="sep">/</span>
       <span onclick="showBuildings(${projectId},'${esc(projectName)}')">${projectName}</span>
       <span class="sep">/</span>
       <span class="current">${buildingName}</span>`;
    updateHeader(`خريطة ${buildingName}`, 'توزيع الوحدات حسب الأدوار وحالتها الحالية');
    showLoader();

    const [floorsData, unitsData] = await Promise.all([
      apiFetch('/api/Floors'),
      apiFetch('/api/Units')
    ]);

    // ✅ FIX: تحويل buildingId إلى Number في فلترة الأدوار
    const floors = arr(floorsData)
      .filter(f => Number(f.buildingId) === Number(buildingId))
      .sort((a,b) => (a.floorNumber??0) - (b.floorNumber??0));

    const units = arr(unitsData);

    state.data         = floors;
    state.filteredData = [...floors];
    state.params       = { projectId: Number(projectId), projectName, units };
    swapContent(renderCurrentView);
  }

  // ───── MODAL ─────
  function openModal(unit) {
    const modal = document.getElementById('unitModal');
    document.getElementById('modalUnitTitle').innerText = `وحدة رقم ${unit.unitNumber}`;
    const bc    = ST_BADGE[unit.status] || 'available';
    const stAr  = ST_AR[unit.status]   || unit.status;
    const price = unit.price ? Number(unit.price).toLocaleString('ar-SA') + ' ر.س' : '—';
    document.getElementById('modalUnitStatus').innerHTML =
      `<span class="status-badge ${bc}">${stAr}</span>`;

    const rows = [
      ['المساحة',    `${unit.area??'—'} م²`],
      ['عدد الغرف',  `${unit.rooms??'—'} غرفة`],
      ['السعر',      price],
      unit.type        ? ['نوع الوحدة',   translateUnitType(unit.type)] : null,
      unit.description ? ['الوصف',        unit.description] : null,
    ].filter(Boolean);

    document.getElementById('modalBody').innerHTML = rows.map((r, i) =>
      `<div class="detail-item" style="animation-delay:${(i+1)*55}ms">
         <span class="detail-label">${r[0]}</span>
         <span class="detail-value">${r[1]}</span>
       </div>`
    ).join('');

    modal.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => modal.classList.add('active')));
  }

  function closeModal() {
    const modal = document.getElementById('unitModal');
    modal.classList.remove('active');
    setTimeout(() => modal.style.display = 'none', 340);
  }

  window.addEventListener('click', e => { if (e.target === document.getElementById('unitModal')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ───── INIT ─────
  showProjects();
</script>
</body>
</html>
