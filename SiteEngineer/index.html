<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الروابي للعقارات — مهندس الموقع</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:      #0D2142;
      --primary-deep: #081830;
      --card-bg:      #112952;
      --card-hover:   #163366;
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.2);
      --light:        #FFFFFF;
      --text-muted:   #8fa3c0;
      --success:      #34c759;
      --warning:      #ffcc00;
      --danger:       #ff3b30;
      --accent:       #4e8df5;
      --engineer:     #00b4d8;
      --header-h:     64px;
      --transition:   all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html, body {
      font-family: 'Tajawal', sans-serif;
      background: var(--primary-deep);
      color: var(--light);
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--primary-deep); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 6px; }

    /* ══ HEADER ══ */
    #app-header {
      position: fixed; top: 0; right: 0; left: 0;
      height: var(--header-h); z-index: 900;
      background: rgba(8,24,48,0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; gap: 16px;
    }
    .header-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .header-logo {
      font-size: 1.15rem; font-weight: 800; color: var(--light);
      letter-spacing: -0.3px; white-space: nowrap;
      cursor: pointer; transition: var(--transition); text-decoration: none;
    }
    .header-logo:hover { opacity: 0.75; }
    .header-divider { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }
    .header-page-label { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
    .header-page-title {
      font-size: .95rem; font-weight: 700; color: var(--light);
      line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-role-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.68rem; font-weight: 600;
      color: var(--engineer); background: rgba(0,180,216,0.1);
      border: 1px solid rgba(0,180,216,0.28);
      padding: 2px 8px; border-radius: 20px; width: fit-content;
    }
    .header-nav { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: center; }
    .nav-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 13px; border-radius: 10px;
      cursor: pointer; color: var(--text-muted);
      font-size: 0.84rem; font-weight: 600;
      border: 1px solid transparent;
      transition: var(--transition); white-space: nowrap;
      background: none; font-family: 'Tajawal', sans-serif; text-decoration: none;
    }
    .nav-tab i { font-size: 1rem; }
    .nav-tab:hover { color: var(--light); background: rgba(255,255,255,0.06); border-color: var(--border); }
    .nav-tab.active { color: var(--light); background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--engineer), #0077b6);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: white;
      border: 2px solid rgba(255,255,255,0.15); flex-shrink: 0;
    }
    .user-name { font-size: 0.88rem; font-weight: 700; color: var(--light); white-space: nowrap; }
    .logout-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px;
      background: rgba(255,59,48,0.1); color: var(--danger);
      border: 1px solid rgba(255,59,48,0.28);
      cursor: pointer; font-family: 'Tajawal', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      transition: var(--transition); white-space: nowrap;
    }
    .logout-btn:hover { background: rgba(255,59,48,0.22); }

    /* ══ MAIN ══ */
    #app-main {
      margin-top: var(--header-h);
      min-height: calc(100vh - var(--header-h));
      padding: 36px 36px 80px;
      max-width: 1400px;
      margin-left: auto; margin-right: auto;
      transition: opacity 0.12s ease;
    }

    /* ══ DASHBOARD ══ */
    .page-header { margin-bottom: 28px; animation: fadeUp 0.5s ease both; }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; color: var(--light); margin-bottom: 4px; }
    .page-header p  { color: var(--text-muted); font-size: 0.9rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; animation: fadeUp 0.5s ease forwards;
      transition: var(--transition); position: relative; overflow: hidden;
    }
    .stat-card::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);
      pointer-events:none;
    }
    .stat-card:hover { transform:translateY(-5px); border-color:var(--border-hover); box-shadow:0 20px 48px rgba(0,0,0,.45); background:var(--card-hover); }
    .stat-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .stat-icon { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .stat-number { font-size:2.2rem; font-weight:800; line-height:1; }
    .stat-label  { font-size:.78rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
    .stat-card.blue   .stat-icon   { background:rgba(78,141,245,.15);  color:var(--accent); }
    .stat-card.teal   .stat-icon   { background:rgba(0,180,216,.15);   color:var(--engineer); }
    .stat-card.green  .stat-icon   { background:rgba(52,199,89,.15);   color:var(--success); }
    .stat-card.yellow .stat-icon   { background:rgba(255,204,0,.15);   color:var(--warning); }
    .stat-card.orange .stat-icon   { background:rgba(255,149,0,.15);   color:#ff9500; }
    .stat-card.blue   .stat-number { color:var(--accent); }
    .stat-card.teal   .stat-number { color:var(--engineer); }
    .stat-card.green  .stat-number { color:var(--success); }
    .stat-card.yellow .stat-number { color:var(--warning); }
    .stat-card.orange .stat-number { color:#ff9500; }

    /* ══ BOTTOM GRID ══ */
    .bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .panel {
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:16px; padding:22px;
      opacity:0; animation:fadeUp .5s ease forwards; animation-delay:.2s;
    }
    .panel-title {
      font-size:.95rem; font-weight:700; color:var(--light);
      margin-bottom:18px; display:flex; align-items:center; gap:8px;
    }
    .panel-title i { color:var(--text-muted); font-size:1.05rem; }

    /* Stage progress bars */
    .prog-item { margin-bottom:14px; }
    .prog-item:last-child { margin-bottom:0; }
    .prog-header { display:flex; justify-content:space-between; margin-bottom:6px; font-size:.83rem; font-weight:600; }
    .prog-header .prog-name { color:var(--light); }
    .prog-header .prog-pct  { color:var(--text-muted); }
    .prog-track { height:6px; background:rgba(255,255,255,.06); border-radius:20px; overflow:hidden; }
    .prog-fill  { height:100%; border-radius:20px; transition:width 1s ease; }

    /* Building cards */
    .bld-list { display:flex; flex-direction:column; gap:10px; }
    .bld-item {
      display:flex; align-items:center; gap:12px;
      padding:12px 14px; border-radius:12px;
      background:rgba(255,255,255,0.02); border:1px solid var(--border);
      transition: var(--transition);
    }
    .bld-item:hover { border-color:var(--border-hover); background:rgba(255,255,255,0.04); }
    .bld-icon { font-size:1.2rem; flex-shrink:0; }
    .bld-info { flex:1; min-width:0; }
    .bld-name { font-size:.88rem; font-weight:700; color:var(--light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bld-project { font-size:.73rem; color:var(--text-muted); margin-top:2px; }
    .bld-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
    .bld-pct { font-size:.85rem; font-weight:800; color:var(--engineer); }
    .bld-bar-wrap { width:70px; height:5px; background:rgba(255,255,255,0.06); border-radius:5px; overflow:hidden; }
    .bld-bar { height:100%; border-radius:5px; transition:width .8s ease; }

    /* Skeleton */
    .skel {
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
      background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:16px;
    }

    /* Overall progress ring area */
    .overall-bar-wrap {
      margin-bottom: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .overall-bar-header { display:flex; justify-content:space-between; margin-bottom:8px; font-size:.85rem; font-weight:700; }
    .overall-bar-header span:first-child { color:var(--light); }
    .overall-bar-header span:last-child  { color:var(--engineer); }
    .overall-track { height:10px; background:rgba(255,255,255,.06); border-radius:20px; overflow:hidden; }
    .overall-fill  { height:100%; border-radius:20px; background:linear-gradient(90deg, var(--engineer), #0077b6); transition:width 1.2s ease; }

    @keyframes fadeUp  { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    @media (max-width: 1100px) { .nav-tab span { display:none; } .nav-tab { padding:8px 10px; } }
    @media (max-width: 768px) {
      #app-header { padding: 0 16px; gap: 10px; }
      .header-nav { display: none; }
      .logout-btn { display: none; }
      .user-name  { display: none; }
      #app-main { padding: 20px 16px 80px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .stat-number { font-size: 1.7rem; }
      .stat-card { padding: 16px; }
      .bottom-grid { grid-template-columns: 1fr; }
      .header-divider { display: none; }
    }
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .header-page-label { display: none; }
    }
  </style>
</head>
<body>

  <header id="app-header"></header>

  <main id="app-main">
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
      <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--engineer);border-radius:50%;animation:spin 0.75s linear infinite"></div>
    </div>
  </main>

  <script src="Layout.js"></script>
  <script src="router.js"></script>

  <script>
    /* ══ Dashboard HTML template ══ */
    window.__dashboardHTML = `
      <div class="page-header">
        <h1>لوحة المعلومات</h1>
        <p>نظرة عامة على مراحل البناء والإنجاز</p>
      </div>
      <div class="stats-grid" id="dash-stats">
        ${Array(5).fill('<div class="skel" style="height:106px"></div>').join('')}
      </div>
      <div class="bottom-grid" id="dash-bottom">
        <div class="skel" style="height:320px"></div>
        <div class="skel" style="height:320px"></div>
      </div>
    `;

    /* ══ Dashboard loader ══ */
    async function loadDashboard() {
      const API = `http://${location.hostname}:5256`;
      function getToken() {
        let t = localStorage.getItem('token') || localStorage.getItem('authToken');
        if (!t) { try { const d = JSON.parse(localStorage.getItem('authData') || '{}'); t = d.token || d.authToken; } catch {} }
        return t || '';
      }
      async function get(p) {
        const r = await fetch(API + p, { headers: { 'Authorization': 'Bearer ' + getToken() } });
        if (!r.ok) throw new Error(r.status);
        return r.json().catch(() => null);
      }
      function arr(v) { return Array.isArray(v) ? v : (v?.data || v?.items || v?.value || v?.results || []); }

      const STAGE_DEFS = [
        { key: 'SitePreparation',  emoji: '⛏️', label: 'تجهيز الموقع' },
        { key: 'Excavation',       emoji: '🪨', label: 'الحفر' },
        { key: 'Foundation',       emoji: '🧱', label: 'الأساسات' },
        { key: 'Structure',        emoji: '🏗️', label: 'الهيكل الإنشائي' },
        { key: 'MasonryAndWalls',  emoji: '🏠', label: 'المباني والحوائط' },
        { key: 'Finishing',        emoji: '🎨', label: 'التشطيبات' },
        { key: 'Handover',         emoji: '🔑', label: 'التسليم' },
      ];

      try {
        const [pd, bd, sd] = await Promise.all([
          get('/api/Projects').catch(() => null),
          get('/api/Buildings').catch(() => null),
          get('/api/ConstructionStages').catch(() => null),
        ]);
        const P = arr(pd), B = arr(bd), S = arr(sd);

        /* ── حسابات صحيحة ── */
        // كل مبنى عنده 7 مراحل — إجمالي المراحل المتوقعة
        const totalExpected = B.length * 7;

        // مراحل مكتملة
        const doneStages = S.filter(s => s.isCompleted === true || s.status === 'Completed').length;

        // مراحل جارية فعلاً (InProgress فقط)
        const inProgress = S.filter(s => s.status === 'InProgress').length;

        // نسبة الإنجاز الكلية = مكتملة ÷ (عدد المباني × 7)
        const overallPct = totalExpected > 0 ? Math.round(doneStages / totalExpected * 100) : 0;

        /* ── Stats cards ── */
        const statsEl = document.getElementById('dash-stats');
        if (!statsEl) return;

        const cards = [
          { cls:'teal',   icon:'ri-building-4-line',      num: P.length,         lbl: 'المشاريع'        },
          { cls:'blue',   icon:'ri-community-line',        num: B.length,         lbl: 'المباني'         },
          { cls:'green',  icon:'ri-checkbox-circle-line',  num: doneStages,       lbl: 'مراحل مكتملة'   },
          { cls:'yellow', icon:'ri-loader-2-line',         num: inProgress,       lbl: 'مراحل جارية'    },
          { cls:'orange', icon:'ri-percent-line',          num: overallPct + '%', lbl: 'نسبة الإنجاز'   },
        ];

        statsEl.innerHTML = cards.map((c, i) => `
          <div class="stat-card ${c.cls}" style="animation-delay:${i * 60}ms">
            <div class="stat-top">
              <div>
                <div class="stat-number">${c.num}</div>
                <div class="stat-label">${c.lbl}</div>
              </div>
              <div class="stat-icon"><i class="${c.icon}"></i></div>
            </div>
          </div>`).join('');

        /* ── توزيع المراحل ── */
        // نجمع كل stageName الموجود فعلاً في البيانات
        const stageMap = {};
        S.forEach(s => {
          const key = s.stageName;
          if (!stageMap[key]) stageMap[key] = { done: 0, total: 0, label: key, emoji: '🔩' };
          stageMap[key].total++;
          if (s.isCompleted || s.status === 'Completed') stageMap[key].done++;
        });
        // نحاول نطابق مع STAGE_DEFS عشان نجيب الـ label والـ emoji الحلو
        STAGE_DEFS.forEach(d => {
          if (stageMap[d.key]) {
            stageMap[d.key].label = d.label;
            stageMap[d.key].emoji = d.emoji;
          }
        });
        const stageEntries = Object.entries(stageMap);

        /* ── تقدم المباني (من progress field مباشرةً) ── */
        // B فيه projectId و projectName جاهزين من الـ API
        const bldSorted = [...B]
          .sort((a, b) => (b.progress || 0) - (a.progress || 0))
          .slice(0, 6);

        /* ── نسبة إنجاز إجمالية ── */
        const avgProgress = B.length
          ? Math.round(B.reduce((sum, b) => sum + (b.progress || 0), 0) / B.length)
          : 0;

        /* ── Render ── */
        const bottomEl = document.getElementById('dash-bottom');
        if (!bottomEl) return;

        bottomEl.innerHTML = `
          <div class="panel">
            <div class="panel-title"><i class="ri-bar-chart-2-line"></i> توزيع مراحل البناء</div>
            <div class="overall-bar-wrap">
              <div class="overall-bar-header">
                <span>الإنجاز الكلي</span>
                <span>${overallPct}%</span>
              </div>
              <div class="overall-track">
                <div class="overall-fill" style="width:${overallPct}%"></div>
              </div>
            </div>
            ${stageEntries.map(([key, s]) => {
              const pct = s.total ? Math.round(s.done / s.total * 100) : 0;
              const color = pct === 100 ? 'var(--success)' : pct > 0 ? 'var(--engineer)' : 'var(--text-muted)';
              return `<div class="prog-item">
                <div class="prog-header">
                  <span class="prog-name">${s.emoji} ${s.label}</span>
                  <span class="prog-pct">${s.done}/${s.total} — ${pct}%</span>
                </div>
                <div class="prog-track">
                  <div class="prog-fill" style="width:${pct}%;background:${color}"></div>
                </div>
              </div>`;
            }).join('')}
          </div>

          <div class="panel">
            <div class="panel-title"><i class="ri-building-2-line"></i> تقدم المباني</div>
            ${bldSorted.length ? `
              <div class="bld-list">
                ${bldSorted.map(b => {
                  const pct = Math.round(b.progress || 0);
                  const barColor = pct === 100
                    ? 'var(--success)'
                    : pct >= 60 ? 'var(--engineer)'
                    : pct >= 30 ? 'var(--warning)'
                    : 'var(--accent)';
                  return `<div class="bld-item">
                    <div class="bld-icon">🏗️</div>
                    <div class="bld-info">
                      <div class="bld-name">${b.name || 'مبنى #' + b.id}</div>
                      <div class="bld-project"><i class="ri-map-pin-line" style="font-size:.7rem"></i> ${b.projectName || '—'}</div>
                    </div>
                    <div class="bld-right">
                      <div class="bld-pct">${pct}%</div>
                      <div class="bld-bar-wrap">
                        <div class="bld-bar" style="width:${pct}%;background:${barColor}"></div>
                      </div>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            ` : '<p style="color:var(--text-muted);font-size:.9rem;text-align:center;padding:20px">لا توجد مباني بعد</p>'}
          </div>
        `;

      } catch(e) {
        console.error('Dashboard error:', e);
        const bottomEl = document.getElementById('dash-bottom');
        if (bottomEl) bottomEl.innerHTML = `<div style="color:var(--text-muted);padding:20px;text-align:center;grid-column:1/-1">تعذر تحميل البيانات</div>`;
      }
    }

    /* ══ Boot ══ */
    document.addEventListener('DOMContentLoaded', function() {
      const _orig = window.navigate;
      window.navigate = async function(pageId, pushState) {
        await _orig?.(pageId, pushState);
        if (pageId === 'dashboard') setTimeout(loadDashboard, 80);
      };
      window.__initRouter?.();
    });
  </script>
</body>
</html>
